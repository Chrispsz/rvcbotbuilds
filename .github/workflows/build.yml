name: Build RVCBotBuilds

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Which app to build (all, instagram, youtube, music)'
        required: false
        default: 'all'
  push:
    branches: [main]
    paths:
      - 'config.toml'
      - 'utils.sh'
      - 'build.sh'
      - 'custom-patches/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # Build all apps (single job, parallel builds within build.sh)
  # ============================================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache prebuilts
        uses: actions/cache@v4
        with:
          path: |
            temp/crimera-rv
            temp/morpheapp-rv
          key: prebuilts-v1-${{ github.run_id }}
          restore-keys: |
            prebuilts-v1-

      - name: Install deps
        run: sudo apt-get install -y jq zip

      - name: Build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x build.sh utils.sh
          bash build.sh config.toml 2>&1 | tee build.log

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patched-apks
          path: build/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Magisk modules
        uses: actions/upload-artifact@v4
        with:
          name: magisk-modules
          path: build/*.zip
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.md
            build.log
          retention-days: 7
