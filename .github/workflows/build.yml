name: Build RVCBotBuilds

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Which app to build (all, instagram, youtube, music)'
        required: false
        default: 'all'
      create_release:
        description: 'Create GitHub Release? (true/false)'
        required: false
        default: 'false'
  push:
    branches: [main]
    paths:
      - 'config.toml'
      - 'utils.sh'
      - 'build.sh'
      - 'custom-patches/**'
  workflow_call:
    inputs:
      build_target:
        type: string
        default: 'all'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # Build apps based on target selection
  # build_target: all | instagram | youtube | music
  # ============================================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache prebuilts
        uses: actions/cache@v4
        with:
          path: |
            temp/crimera-rv
            temp/morpheapp-rv
          key: prebuilts-v1-${{ github.run_id }}
          restore-keys: |
            prebuilts-v1-

      - name: Install deps
        run: sudo apt-get install -y jq zip python3

      - name: Select build target
        id: target
        run: |
          TARGET="${{ inputs.build_target || 'all' }}"
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Build target: $TARGET"

          if [ "$TARGET" != "all" ]; then
            echo "Disabling non-target apps..."
            # Disable all apps first
            sed -i '/^\[YouTube-Morphe\]/,/^\[Music-Morphe\]/{ s/^enabled = true/enabled = false/ }' config.toml
            sed -i '/^\[Music-Morphe\]/,/^\[Instagram-Piko\]/{ s/^enabled = true/enabled = false/ }' config.toml
            sed -i '/^\[Instagram-Piko\]/,$/{ s/^enabled = true/enabled = false/ }' config.toml

            # Re-enable only the target
            case "$TARGET" in
              youtube)
                sed -i '/^\[YouTube-Morphe\]/,/^\[Music-Morphe\]/{ s/^enabled = false/enabled = true/ }' config.toml
                ;;
              music)
                sed -i '/^\[Music-Morphe\]/,/^\[Instagram-Piko\]/{ s/^enabled = false/enabled = true/ }' config.toml
                ;;
              instagram)
                sed -i '/^\[Instagram-Piko\]/,$/{ s/^enabled = false/enabled = true/ }' config.toml
                ;;
            esac
          fi

          echo ""
          echo "=== Active config ==="
          grep -E '^\[.*\]|^enabled' config.toml

      - name: Build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x build.sh utils.sh
          bash build.sh config.toml 2>&1 | tee build.log

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: patched-apks
          path: build/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Magisk modules
        uses: actions/upload-artifact@v7
        with:
          name: magisk-modules
          path: build/*.zip
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: |
            build.md
            build.log
          retention-days: 7

      - name: Create GitHub Release
        if: inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ steps.target.outputs.target }}-$(date +'%Y%m%d-%H%M')"
          name: "RVCBotBuilds ${{ steps.target.outputs.target }} $(date +'%Y-%m-%d')"
          body_path: build.md
          prerelease: true
          files: |
            build/*.apk
            build/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
