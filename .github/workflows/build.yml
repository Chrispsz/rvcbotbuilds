name: 🔨 Build All

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Target (all, instagram, youtube, music)'
        required: false
        default: 'all'
  workflow_call:
    inputs:
      build_target:
        type: string
        default: 'all'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore keystores
        run: |
          echo "${{ secrets.KS_KEYSTORE_B64 }}" | base64 -d > ks.keystore
          echo "${{ secrets.KS_P12_KEYSTORE_B64 }}" | base64 -d > ks-p12.keystore
          chmod 644 ks.keystore ks-p12.keystore

      - name: Cache prebuilts
        uses: actions/cache@v4
        with:
          path: |
            temp/crimera-rv
            temp/morpheapp-rv
          key: prebuilts-v1-${{ github.run_id }}
          restore-keys: prebuilts-v1-

      - name: Install deps
        run: sudo apt-get install -y jq zip python3

      - name: Select build target
        id: target
        run: |
          set_app_enabled() {
            local section="$1" state="$2"
            awk -v sec="[$section]" -v val="enabled = $state" '
              $0 == sec { in_sec=1; print; next }
              in_sec && /^enabled = / { print val; in_sec=0; next }
              in_sec && /^\[/ { in_sec=0 }
              { print }
            ' config.toml > config.toml.tmp && mv config.toml.tmp config.toml
          }

          TARGET="${{ inputs.build_target || 'all' }}"
          echo "target=$TARGET" >> $GITHUB_OUTPUT

          if [ "$TARGET" != "all" ]; then
            set_app_enabled "YouTube-Morphe" false
            set_app_enabled "Music-Morphe" false
            set_app_enabled "Instagram-Piko" false
            case "$TARGET" in
              youtube)   set_app_enabled "YouTube-Morphe" true ;;
              music)     set_app_enabled "Music-Morphe" true ;;
              instagram) set_app_enabled "Instagram-Piko" true ;;
            esac
          fi

          echo "=== Active config ==="
          grep -E '^\[.*\]|^enabled' config.toml

      - name: Build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x build.sh utils.sh
          bash build.sh config.toml 2>&1 | tee build.log

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: patched-apks
          path: build/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload modules
        uses: actions/upload-artifact@v7
        with:
          name: magisk-modules
          path: build/*.zip
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: |
            build.md
            build.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: rm -f ks.keystore ks-p12.keystore
