name: Build RVCBotBuilds

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config.toml'
      - 'utils.sh'
      - 'build.sh'
      - 'custom-patches/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Build all apps
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x build.sh utils.sh
          bash build.sh config.toml 2>&1 | tee build.log

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patched-apks
          path: build/*.apk
          retention-days: 30

      - name: Upload Magisk modules
        uses: actions/upload-artifact@v4
        with:
          name: magisk-modules
          path: build/*.zip
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.md
            build.log
          retention-days: 7
