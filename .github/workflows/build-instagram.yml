name: 📸 Build Instagram Mod

on:
  workflow_call:
    secrets:
      PAT_TOKEN:
        required: false
      KS_KEYSTORE_B64:
        required: true
      KS_P12_KEYSTORE_B64:
        required: true
      KS_PASSWORD:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore keystores
        run: |
          echo "${{ secrets.KS_KEYSTORE_B64 }}" | base64 -d > ks.keystore
          echo "${{ secrets.KS_P12_KEYSTORE_B64 }}" | base64 -d > ks-p12.keystore
          chmod 644 ks.keystore ks-p12.keystore

      - name: Cache prebuilts
        uses: actions/cache@v4
        with:
          path: temp/chrispsz-rv
          # Include piko version in key to invalidate on new .mpp
          key: piko-prebuilts-v3-${{ hashFiles('config.toml') }}
          restore-keys: |
            piko-prebuilts-v3-

      - name: Install deps
        run: sudo apt-get install -y jq zip python3

      - name: Prepare Instagram-only config
        run: |
          set_app_enabled() {
            local section="$1" state="$2"
            awk -v sec="[$section]" -v val="enabled = $state" '
              $0 == sec { in_sec=1; print; next }
              in_sec && /^enabled = / { print val; in_sec=0; next }
              in_sec && /^\[/ { in_sec=0 }
              { print }
            ' config.toml > config.toml.tmp && mv config.toml.tmp config.toml
          }
          set_app_enabled "YouTube-Morphe" false
          set_app_enabled "Music-Morphe" false
          echo "=== Active config ==="
          grep -E '^\[.*\]|^enabled' config.toml

      - name: Build Instagram
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
        run: |
          # Always force fresh .mpp download (patches-version = "dev" gets latest)
          # Delete cached piko prebuilts to prevent stale .mpp
          rm -rf temp/chrispsz-rv/patches-*.mpp temp/chrispsz-rv/patches-*.jar 2>/dev/null || true
          echo "Cleared cached .mpp files — will download fresh from Chrispsz/piko"

          chmod +x build.sh utils.sh
          bash build.sh config.toml 2>&1 | tee build.log

      - name: Diagnose build
        if: always()
        run: |
          chmod +x diagnose-build.sh 2>/dev/null || true
          bash diagnose-build.sh build/ 2>/dev/null || echo "Diagnosis skipped (script not found or failed)"

          # Additional CI-specific diagnostics
          echo ""
          echo "=== CI Build Summary ==="
          if [ -f "build.log" ]; then
            # Show which patches were applied
            echo "--- Applied patches ---"
            grep -i "patch" build.log 2>/dev/null | grep -v "^$" | tail -20 || echo "No patch info in log"
            echo ""
            # Check for specific failures
            echo "--- Key events ---"
            grep -E "(Getting prebuilts|Choosing version|Building|Failed|Error|succeeded)" build.log 2>/dev/null | tail -15 || true
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: instagram-mod-apk
          path: build/*.apk
          retention-days: 5
          if-no-files-found: error

      - name: Cleanup
        if: always()
        run: rm -f ks.keystore ks-p12.keystore
