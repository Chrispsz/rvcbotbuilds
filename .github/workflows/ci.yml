name: CI Build and Release

# ============================================
# RVCArise — CI Pipeline (10/10 efficiency)
# ============================================
# Design principles:
#   1. NEVER rebuild when outputs won't change
#   2. One preflight job (zygisk-detach + update check) — not two
#   3. LFS only where binaries are touched
#   4. Content-based cache keys (reuse across runs)
#   5. Build guards against failed sync
#   6. Always-on failure notification
# ============================================

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force rebuild all apps?"
        required: false
        default: "false"
  schedule:
    # 13:00 BRT (America/Sao_Paulo = UTC-3) = 16:00 UTC
    - cron: "0 16 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # PREFLIGHT — single job that does zygisk-detach update + decision
  # Merges what was previously two jobs into one, saving:
  #   - 1 runner allocation/day
  #   - 1 LFS checkout/day
  #   - 1 apt install/day
  # ============================================================
  preflight:
    name: Preflight
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      SHOULD_BUILD: ${{ steps.decide.outputs.SHOULD_BUILD }}
      SYNC_UPSTREAM: ${{ steps.decide.outputs.SYNC_UPSTREAM }}
      MORPHE_VERSION: ${{ steps.decide.outputs.MORPHE_VERSION }}
      UPSTREAM_SHA: ${{ steps.decide.outputs.UPSTREAM_SHA }}
      DETACH_UPDATED: ${{ steps.detach.outputs.DETACH_UPDATED }}
      DETACH_VERSION: ${{ steps.detach.outputs.DETACH_VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # NO lfs: true here — we pull LFS objects explicitly in the next step.
          # This avoids the "could not read Username" fetch error that occurs
          # when actions/checkout tries to fetch LFS during the main git fetch.

      - name: "Pull LFS objects (explicit, more reliable than lfs pull)"
        run: |
          git lfs install --local
          git lfs pull
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install deps (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: jq unzip
          version: v1

      - name: Validate token (warn early if expired)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          HAS_PAT_TOKEN: ${{ secrets.PAT_TOKEN != '' }}
        run: |
          source scripts/utilities/gh-api.sh
          if [ "$HAS_PAT_TOKEN" != "true" ]; then
            echo "::warning::PAT_TOKEN secret is not set. Push commits will NOT trigger downstream CI. Daily cron keeps the loop alive, but sync-upstream changes won't build until the next scheduled run."
          fi
          gh_api_check_token || echo "::warning::Token validation failed. Push operations may fail."

      - name: Update zygisk-detach
        id: detach
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/utilities/update-zygisk-detach.sh
          if bash scripts/utilities/update-zygisk-detach.sh; then
            echo "DETACH_UPDATED=1" >> $GITHUB_OUTPUT
            echo "::notice::zygisk-detach binaries updated"
          else
            echo "DETACH_UPDATED=0" >> $GITHUB_OUTPUT
            echo "::notice::zygisk-detach up-to-date or no changes"
          fi
          DETACH_VER=$(cat build-meta/zygisk-detach-version.txt 2>/dev/null || echo "")
          echo "DETACH_VERSION=$DETACH_VER" >> $GITHUB_OUTPUT

      - name: Commit zygisk-detach if changed
        if: steps.detach.outputs.DETACH_UPDATED == '1'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          source scripts/utilities/gh-api.sh
          source scripts/utilities/ci-helpers.sh
          ci_git_setup_bot
          git add module/bin/ module/zygisk/ build-meta/zygisk-detach-version.txt
          if ci_commit_if_changed "chore: update zygisk-detach binaries [skip ci]"; then
            gh_push "https://github.com/${{ github.repository }}.git" main
          fi

      - name: Decide
        id: decide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source scripts/utilities/gh-api.sh
          source scripts/utilities/ci-helpers.sh

          SHOULD_BUILD=0
          SYNC_UPSTREAM=0

          # === Layer 1: j-hc upstream SHA ===
          UPSTREAM_SHA=""
          if gh_api_get "https://api.github.com/repos/j-hc/revanced-magisk-module/commits/main" -; then
            UPSTREAM_SHA=$(echo "$GH_API_LAST_BODY" | jq -r '.sha // empty')
          else
            ci_warn "could not fetch upstream SHA (HTTP $GH_API_LAST_CODE) — skipping upstream check"
          fi
          LAST_SHA=$(cat build-meta/jhc-upstream-sha.txt 2>/dev/null | tr -d '[:space:]' || echo "")
          echo "::debug::UPSTREAM_SHA='$UPSTREAM_SHA' LAST_SHA='$LAST_SHA'"
          if [ -n "$UPSTREAM_SHA" ] && [ "$UPSTREAM_SHA" != "$LAST_SHA" ]; then
            SYNC_UPSTREAM=1
            ci_log "Upstream j-hc changed: $LAST_SHA → $UPSTREAM_SHA"
          fi

          # === Layer 1.5: build-affecting diff (NEW — skip cosmetic changes) ===
          # Use GitHub compare API instead of git diff — no need for fetch-depth: 0
          if [ "$SYNC_UPSTREAM" = "1" ] && [ -n "$LAST_SHA" ]; then
            COMPARE_URL="https://api.github.com/repos/j-hc/revanced-magisk-module/compare/$LAST_SHA...$UPSTREAM_SHA"
            if gh_api_get "$COMPARE_URL" -; then
              # Extract filenames from the compare response, filter to build-affecting paths
              ALL_FILES=$(echo "$GH_API_LAST_BODY" | jq -r '.files[].filename // empty')
              BUILD_AFFECTING=$(echo "$ALL_FILES" | grep -E '^(build\.sh|utils\.sh|build-termux\.sh|config\.toml|module/|bin/|scripts/|ksu_profile/)' || echo "")
              if [ -z "$BUILD_AFFECTING" ]; then
                ci_log "Upstream changed but ONLY non-build files (README/.github/docs) — no rebuild needed"
                ci_log "Changed files: $(echo "$ALL_FILES" | tr '\n' ' ' | head -c 200)"
                SYNC_UPSTREAM=0
              else
                ci_log "Build-affecting files changed upstream:"
                echo "$BUILD_AFFECTING" | sed 's/^/  - /'
              fi
            else
              ci_warn "could not fetch compare (HTTP $GH_API_LAST_CODE) — assuming build-affecting (conservative)"
            fi
          fi

          # === Layer 2: Morphe version ===
          MORPHE_VERSION=""
          if gh_api_get "https://api.github.com/repos/MorpheApp/morphe-patches/releases" -; then
            MORPHE_VERSION=$(echo "$GH_API_LAST_BODY" | jq -r '[.[] | select(.prerelease == false)] | .[0].tag_name // empty')
          else
            ci_warn "could not fetch Morphe releases (HTTP $GH_API_LAST_CODE)"
          fi
          LAST_MORPHE=$(cat build-meta/morphe-version.txt 2>/dev/null | tr -d '[:space:]' || echo "")
          echo "::debug::MORPHE_VERSION='$MORPHE_VERSION' LAST_MORPHE='$LAST_MORPHE'"

          if { [ -z "$LAST_MORPHE" ] && [ -n "$MORPHE_VERSION" ]; } || { [ -n "$MORPHE_VERSION" ] && [ "$MORPHE_VERSION" != "$LAST_MORPHE" ]; }; then
            SHOULD_BUILD=1
            ci_log "Morphe changed: $LAST_MORPHE → $MORPHE_VERSION"
          fi

          # === Layer 3: already released? ===
          # Compares the Morphe version in the latest release body against the
          # upstream Morphe version. Normalizes the leading 'v' on both sides,
          # because the release-body regex strips it while tag_name keeps it.
          # (Previous bug: "1.35.0" never equalled "v1.35.0" — skip never fired.)
          if [ "$SHOULD_BUILD" = "1" ]; then
            REL_MORPHE=""
            if gh_api_get "https://api.github.com/repos/$GITHUB_REPOSITORY/releases?per_page=1" -; then
              REL_MORPHE=$(echo "$GH_API_LAST_BODY" | jq -r '.[0].body // empty' | grep -oP 'Morphe Patches v?\K[^\s]+' | head -1 || echo "")
            fi
            # Strip leading 'v' so both sides are comparable (1.35.0 == 1.35.0)
            REL_MORPHE_NORM="${REL_MORPHE#v}"
            MORPHE_VERSION_NORM="${MORPHE_VERSION#v}"
            echo "::debug::LATEST_RELEASE_MORPHE='$REL_MORPHE' (norm='$REL_MORPHE_NORM') vs MORPHE='$MORPHE_VERSION' (norm='$MORPHE_VERSION_NORM')"
            if [ -n "$REL_MORPHE_NORM" ] && [ -n "$MORPHE_VERSION_NORM" ] && [ "$REL_MORPHE_NORM" = "$MORPHE_VERSION_NORM" ]; then
              if [ "$SYNC_UPSTREAM" = "0" ]; then
                SHOULD_BUILD=0
                ci_log "Skipping build — latest release already has Morphe $MORPHE_VERSION_NORM and no upstream change"
              else
                ci_log "Morphe unchanged but upstream changed (build-affecting) — will build, release dedup will skip release if APKs identical"
              fi
            fi
          fi

          # === Sync upstream implies rebuild (only if build-affecting) ===
          if [ "$SYNC_UPSTREAM" = "1" ]; then
            SHOULD_BUILD=1
          fi

          # === Force build ===
          if [ "${{ inputs.force_build }}" = "true" ]; then
            SHOULD_BUILD=1
            ci_log "Force build requested"
          fi

          # === Force build if zygisk-detach was just updated ===
          if [ "${{ steps.detach.outputs.DETACH_UPDATED }}" = "1" ]; then
            SHOULD_BUILD=1
            ci_log "zygisk-detach updated — forcing rebuild"
          fi

          ci_log "FINAL: SHOULD_BUILD=$SHOULD_BUILD SYNC_UPSTREAM=$SYNC_UPSTREAM MORPHE_VERSION=$MORPHE_VERSION"
          echo "SHOULD_BUILD=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "SYNC_UPSTREAM=$SYNC_UPSTREAM" >> $GITHUB_OUTPUT
          echo "MORPHE_VERSION=$MORPHE_VERSION" >> $GITHUB_OUTPUT
          echo "UPSTREAM_SHA=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

  # ============================================================
  # SYNC UPSTREAM — merge j-hc preserving custom files
  # ============================================================
  sync-upstream:
    name: Sync Upstream
    needs: preflight
    if: needs.preflight.outputs.SYNC_UPSTREAM == '1'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Install deps (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: jq
          version: v1
      - name: Merge upstream (protected files preserved)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          source scripts/utilities/gh-api.sh
          source scripts/utilities/ci-helpers.sh
          ci_git_setup_bot

          PROTECTED_FILES=(
            "config.toml"
            ".github/workflows/ci.yml"
            "build-meta/"
            "scripts/utilities/gh-api.sh"
            "scripts/utilities/ci-helpers.sh"
            "scripts/utilities/update-zygisk-detach.sh"
            "scripts/utilities/combine-modules.sh"
            "scripts/utilities/notify.sh"
            "module/post-fs-data.sh"
            "module/service.sh"
            "module/uninstall.sh"
            "module/customize.sh"
            "generate-changelog.py"
            "README.md"
            "CONFIG.md"
            "CONTRIBUTING.md"
          )

          echo "=== Pre-sync verification ==="
          ci_verify_preserved "${PROTECTED_FILES[@]}" || {
            ci_err "Pre-sync check failed — protected files missing before sync. Aborting to avoid data loss."
            exit 1
          }

          BACKUP_DIR=$(mktemp -d)
          trap 'rm -rf "$BACKUP_DIR"' EXIT
          echo "=== Backing up protected files ==="
          ci_backup_tree "$BACKUP_DIR" "${PROTECTED_FILES[@]}"

          git remote add upstream https://github.com/j-hc/revanced-magisk-module.git 2>/dev/null || true
          git fetch upstream main --depth=100

          echo "=== Merging upstream/main ==="
          MERGE_CONFLICTS=""
          if ! git merge upstream/main --no-edit -X ours; then
            MERGE_CONFLICTS=$(git diff --name-only --diff-filter=U)
            if [ -n "$MERGE_CONFLICTS" ]; then
              echo "::warning::Merge conflicts in these files (resolving with --ours):"
              echo "$MERGE_CONFLICTS" | sed 's/^/  - /'
              echo "$MERGE_CONFLICTS" | while IFS= read -r f; do
                [ -n "$f" ] && git checkout --ours "$f" && git add "$f"
              done
              git commit --no-edit || true
            fi
          fi

          echo "=== Restoring protected files ==="
          ci_restore_tree "$BACKUP_DIR"

          echo "=== Post-sync verification ==="
          ci_verify_preserved "${PROTECTED_FILES[@]}" || {
            ci_err "Post-sync check failed — protected files lost during sync! Manual intervention required."
            ci_err "Backup is at: $BACKUP_DIR (preserved for debugging)"
            trap - EXIT
            exit 1
          }

          git add -A
          if git diff --cached --quiet; then
            ci_log "Sync complete — no custom files needed restoration"
          else
            git commit -m "chore: restore custom config after j-hc sync" >/dev/null
            ci_log "Sync complete — restored custom files"
          fi

          gh_push "https://github.com/${{ github.repository }}.git" main

  # ============================================================
  # BUILD — runs only if SHOULD_BUILD=1 AND sync didn't fail
  # ============================================================
  build:
    name: Build
    needs: [preflight, sync-upstream]
    # `always()` needed because sync-upstream may be skipped.
    # `result != 'failure'` ensures we DON'T build on top of a broken sync.
    if: always() && needs.preflight.outputs.SHOULD_BUILD == '1' && needs.sync-upstream.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Restore keystores
        run: |
          echo "${{ secrets.KS_KEYSTORE_B64 }}" | base64 -d > ks.keystore
          echo "${{ secrets.KS_P12_KEYSTORE_B64 }}" | base64 -d > ks-p12.keystore
          chmod 644 ks.keystore ks-p12.keystore
      - name: Restore build cache (content-based key)
        uses: actions/cache@v4
        with:
          path: temp/morpheapp-rv
          # Content-based key: only invalidates when config.toml changes
          key: morphe-v7-${{ hashFiles('config.toml') }}
          restore-keys: morphe-v7-
      - name: Install deps (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: jq zip python3
          version: v1
      - name: Build
        id: buildstep
        # NOTE: continue-on-error removed. If build fails, the job fails so
        # release doesn't run on broken output. The verify step below is a
        # second safety net (size validation), but we no longer mask errors.
        env:
          GITHUB_TOKEN: ${{ github.token }}
          KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
        run: |
          rm -rf temp/morpheapp-rv/patches-*.mpe temp/morpheapp-rv/patches-*.jar 2>/dev/null || true
          rm -rf temp/morpheapp-rv/cli-*.jar 2>/dev/null || true
          chmod +x build.sh utils.sh
          bash build.sh config.toml 2>&1 | tee build.log
      - name: Verify outputs (existence + minimum size)
        id: verify
        if: always()
        run: |
          source scripts/utilities/ci-helpers.sh
          FOUND=0
          FAILED=0

          for f in build/youtube-morphe-*.apk; do
            [ -f "$f" ] && { ci_validate_file "$f" 30 "YouTube APK" && FOUND=$((FOUND+1)) || FAILED=1; }
          done
          for f in build/youtube-morphe-*.zip; do
            [ -f "$f" ] && { ci_validate_file "$f" 1 "YouTube Module" && FOUND=$((FOUND+1)) || FAILED=1; }
          done
          for f in build/music-morphe-*.apk; do
            [ -f "$f" ] && { ci_validate_file "$f" 20 "Music APK" && FOUND=$((FOUND+1)) || FAILED=1; }
          done
          for f in build/music-morphe-*.zip; do
            [ -f "$f" ] && { ci_validate_file "$f" 1 "Music Module" && FOUND=$((FOUND+1)) || FAILED=1; }
          done

          echo "found_count=$FOUND" >> $GITHUB_OUTPUT

          if [ "$FOUND" -eq 0 ]; then
            ci_err "No build outputs found!"
            echo "=== Last 30 lines of build.log ==="
            tail -30 build.log 2>/dev/null || true
            exit 1
          fi

          if [ "$FAILED" -eq 1 ]; then
            ci_err "Some build outputs failed size validation — aborting release"
            exit 1
          fi

          ci_log "All $FOUND outputs validated successfully"
      - name: Upload YouTube APK
        if: always() && steps.verify.outcome != 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: youtube-mod-apk
          path: build/youtube-*.apk
          retention-days: 5
          if-no-files-found: warn
      - name: Upload YouTube Module
        if: always() && steps.verify.outcome != 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: youtube-magisk-module
          path: build/youtube-*.zip
          retention-days: 5
          if-no-files-found: warn
      - name: Upload Music APK
        if: always() && steps.verify.outcome != 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: music-mod-apk
          path: build/music-*.apk
          retention-days: 5
          if-no-files-found: warn
      - name: Upload Music Module
        if: always() && steps.verify.outcome != 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: music-magisk-module
          path: build/music-*.zip
          retention-days: 5
          if-no-files-found: warn
      - name: Cleanup
        if: always()
        run: rm -f ks.keystore ks-p12.keystore

  # ============================================================
  # RELEASE — only on successful build
  # ============================================================
  release:
    name: Release
    needs: [preflight, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: jq
          version: v1
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
        continue-on-error: true
      - name: Organize assets
        run: |
          mkdir -p assets
          find release-assets/ -type f \( -name "*.apk" -o -name "*.zip" \) -exec mv {} assets/ \; 2>/dev/null || true
          echo "=== Assets to release ==="
          ls -lh assets/
          if [ -z "$(ls -A assets/ 2>/dev/null)" ]; then
            echo "::error::No assets found — refusing to create empty release"
            exit 1
          fi
      - name: Check for duplicate release (content-based dedup)
        id: dedup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source scripts/utilities/gh-api.sh
          source scripts/utilities/ci-helpers.sh

          # Extract version strings from built asset filenames.
          # Pattern: {app}-morphe[-module]-v{VERSION}-{arch}.{ext}
          YT_VER=""
          MUSIC_VER=""
          for f in assets/youtube-morphe-*.apk; do
            [ -f "$f" ] || continue
            YT_VER=$(basename "$f" | grep -oP 'youtube-morphe-v\K[0-9.]+(?=-arm)' | head -1 || echo "")
            break
          done
          for f in assets/music-morphe-*.apk; do
            [ -f "$f" ] || continue
            MUSIC_VER=$(basename "$f" | grep -oP 'music-morphe-v\K[0-9.]+(?=-arm)' | head -1 || echo "")
            break
          done

          # Compute config.toml hash — this is the KEY signal for whether
          # a release is needed even when APK base versions are unchanged.
          # If patches were added/removed, the APK output differs even with
          # the same base version, so we MUST release.
          CONFIG_HASH=$(sha256sum config.toml 2>/dev/null | awk '{print $1}')
          CONFIG_HASH_SHORT="${CONFIG_HASH:0:12}"
          ci_log "Built versions — YouTube: ${YT_VER:-unknown}, Music: ${MUSIC_VER:-unknown} | config.toml hash: ${CONFIG_HASH_SHORT:-none}"

          # If we can't extract versions, don't risk skipping a needed release
          if [ -z "$YT_VER" ] || [ -z "$MUSIC_VER" ]; then
            ci_warn "Could not extract versions from asset filenames — proceeding with release (no dedup)"
            echo "skip_release=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fetch the latest release's asset names + body to compare against
          if ! gh_api_get "https://api.github.com/repos/$GITHUB_REPOSITORY/releases?per_page=1" -; then
            ci_warn "Could not fetch latest release for dedup — proceeding with release"
            echo "skip_release=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          LATEST_ASSETS=$(echo "$GH_API_LAST_BODY" | jq -r '.[0].assets[].name // empty' 2>/dev/null || echo "")
          LATEST_BODY=$(echo "$GH_API_LAST_BODY" | jq -r '.[0].body // empty' 2>/dev/null || echo "")
          if [ -z "$LATEST_ASSETS" ]; then
            ci_log "No previous release/assets found — first release, no dedup"
            echo "skip_release=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if the latest release already contains assets with these exact versions
          YT_MATCH=$(printf '%s\n' "$LATEST_ASSETS" | grep -c "youtube-morphe.*-v${YT_VER}-" || true)
          MUSIC_MATCH=$(printf '%s\n' "$LATEST_ASSETS" | grep -c "music-morphe.*-v${MUSIC_VER}-" || true)
          [ -z "$YT_MATCH" ] && YT_MATCH=0
          [ -z "$MUSIC_MATCH" ] && MUSIC_MATCH=0

          # Check if config.toml hash matches the one recorded in the latest release body.
          # generate-changelog.py writes a line like: "Config hash: <short_hash>"
          LATEST_CONFIG_HASH=$(echo "$LATEST_BODY" | grep -oP 'Config hash: \K[a-f0-9]+' | head -1 || echo "")
          ci_log "Latest release config hash: ${LATEST_CONFIG_HASH:-none} | current: ${CONFIG_HASH_SHORT:-none}"

          CONFIG_CHANGED=0
          if [ -n "$CONFIG_HASH_SHORT" ] && [ -n "$LATEST_CONFIG_HASH" ] && [ "$CONFIG_HASH_SHORT" != "$LATEST_CONFIG_HASH" ]; then
            CONFIG_CHANGED=1
            ci_log "Config changed since last release ($LATEST_CONFIG_HASH → $CONFIG_HASH_SHORT) — must release even if APK versions match"
          fi

          if [ "$YT_MATCH" -gt 0 ] && [ "$MUSIC_MATCH" -gt 0 ] && [ "$CONFIG_CHANGED" = "0" ]; then
            echo "skip_release=1" >> $GITHUB_OUTPUT
            ci_log "SKIP RELEASE — latest release already has YouTube v$YT_VER + Music v$MUSIC_VER with identical config (identical output)"
            ci_log "Build artifacts are retained as workflow artifacts (5-day retention) in case manual release is needed"
          else
            echo "skip_release=0" >> $GITHUB_OUTPUT
            if [ "$CONFIG_CHANGED" = "1" ]; then
              ci_log "Will create new release — config.toml changed since last release (YT:$YT_MATCH MUSIC:$MUSIC_MATCH version matches, but config differs)"
            else
              ci_log "Will create new release — versions differ from latest release (YT:$YT_MATCH MUSIC:$MUSIC_MATCH matches in prev release)"
            fi
          fi
      - name: Generate release
        id: meta
        if: steps.dedup.outputs.skip_release != '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source scripts/utilities/gh-api.sh
          source scripts/utilities/ci-helpers.sh

          BASE="v$(date +'%Y.%m.%d')"
          NUM=1
          EXISTING=""
          if gh_api_get "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" -; then
            EXISTING=$(echo "$GH_API_LAST_BODY" | jq -r ".[].tag_name | select(startswith(\"$BASE\"))" 2>/dev/null || echo "")
          fi
          if [ -n "$EXISTING" ]; then
            HIGHEST=0
            while IFS= read -r t; do
              N=$(echo "$t" | sed "s/${BASE}-//" 2>/dev/null || echo "0")
              [ "$N" -gt "$HIGHEST" ] 2>/dev/null && HIGHEST=$N
            done <<< "$EXISTING"
            NUM=$((HIGHEST + 1))
          fi
          TAG="${BASE}-${NUM}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          ci_log "Release tag: $TAG"

          MORPHE_VER="${{ needs.preflight.outputs.MORPHE_VERSION }}"
          DETACH_VER="${{ needs.preflight.outputs.DETACH_VERSION }}"

          # Compute short config.toml hash to embed in release body.
          # The dedup step reads this back to detect config-only changes
          # that still warrant a new release (e.g. patch added/removed).
          CONFIG_HASH=$(sha256sum config.toml 2>/dev/null | awk '{print $1}')
          CONFIG_HASH_SHORT="${CONFIG_HASH:0:12}"

          python3 generate-changelog.py "$TAG" "$MORPHE_VER" "$DETACH_VER" "$CONFIG_HASH_SHORT" > release-notes.md

      - name: Create release
        if: steps.dedup.outputs.skip_release != '1'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "RVCArise ${{ steps.meta.outputs.tag }}"
          body_path: release-notes.md
          files: |
            assets/*.apk
            assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release skipped (dedup)
        if: steps.dedup.outputs.skip_release == '1'
        run: |
          echo "::notice::Release skipped — built APKs are identical to the latest release. Artifacts retained as workflow artifacts."

  # ============================================================
  # UPDATE META — record what we built, so next run can skip
  # ============================================================
  update-meta:
    name: Update Metadata
    needs: [preflight, release]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # NO lfs: true — we only touch build-meta/*.txt
      - name: Update tracking files
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          source scripts/utilities/gh-api.sh
          source scripts/utilities/ci-helpers.sh

          mkdir -p build-meta
          MORPHE="${{ needs.preflight.outputs.MORPHE_VERSION }}"
          [ -n "$MORPHE" ] && echo "$MORPHE" > build-meta/morphe-version.txt

          UPSTREAM_SHA="${{ needs.preflight.outputs.UPSTREAM_SHA }}"
          [ -n "$UPSTREAM_SHA" ] && echo "$UPSTREAM_SHA" > build-meta/jhc-upstream-sha.txt

          ci_git_setup_bot
          if ci_commit_if_changed "chore: update build metadata [skip ci]"; then
            gh_push "https://github.com/${{ github.repository }}.git" main
          fi

  # ============================================================
  # CLEANUP — delete old releases (>7d) and stale workflow runs
  # ============================================================
  cleanup:
    name: Cleanup
    needs: [preflight, release]
    # Run when a build happened (release exists to clean) OR
    # when no build happened but we still want run-log hygiene.
    if: always() && (needs.release.result == 'success' || needs.preflight.outputs.SHOULD_BUILD != '1')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # NO lfs: true — cleanup only calls the API
      - name: Install deps (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: jq python3
          version: v1
      - name: Remove old releases (>7 days) — robust date comparison
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source scripts/utilities/gh-api.sh
          CUTOFF=$(python3 -c "
          from datetime import date, timedelta
          print((date.today() - timedelta(days=7)).isoformat())
          ")
          echo "Cutoff date: $CUTOFF"

          if ! gh_api_get "https://api.github.com/repos/$GITHUB_REPOSITORY/releases?per_page=100" -; then
            echo "::warning::could not list releases for cleanup (HTTP $GH_API_LAST_CODE)"
            exit 0
          fi

          echo "$GH_API_LAST_BODY" | python3 -c "
          import json, sys
          from datetime import date, timedelta
          cutoff = (date.today() - timedelta(days=7)).isoformat()
          try:
              releases = json.load(sys.stdin)
          except Exception:
              sys.exit(0)
          for r in releases:
              rel_id = r.get('id')
              tag = r.get('tag_name','')
              pub = (r.get('published_at') or '')[:10]
              if pub and pub < cutoff:
                  print(f'{rel_id}\t{tag}')
          " | while IFS=$'\t' read -r rel_id rel_tag; do
            echo "  deleting release $rel_tag (published before $CUTOFF)"
            gh_api_call DELETE "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$rel_id" /dev/null >/dev/null 2>&1 || true
            gh_api_call DELETE "https://api.github.com/repos/$GITHUB_REPOSITORY/git/refs/tags/$rel_tag" /dev/null >/dev/null 2>&1 || true
          done
      - name: Keep only last 3 workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source scripts/utilities/gh-api.sh
          if ! gh_api_get "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows" -; then
            echo "::warning::could not list workflows (HTTP $GH_API_LAST_CODE)"
            exit 0
          fi
          for wf_id in $(echo "$GH_API_LAST_BODY" | jq -r '.workflows[].id'); do
            if ! gh_api_get "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/$wf_id/runs?per_page=100" -; then
              continue
            fi
            runs=$(echo "$GH_API_LAST_BODY" | jq -r '[.workflow_runs[] | select(.conclusion != "in_progress")] | sort_by(.created_at) | reverse | .[3:] | .[].id')
            for run_id in $runs; do
              gh_api_call DELETE "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/$run_id" /dev/null >/dev/null 2>&1 || true
            done
          done

  # ============================================================
  # NOTIFY — always runs last, posts to Telegram if anything failed
  # ============================================================
  notify:
    name: Notify
    needs: [preflight, sync-upstream, build, release, update-meta, cleanup]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          PREFLIGHT: ${{ needs.preflight.result }}
          SYNC: ${{ needs.sync-upstream.result }}
          BUILD: ${{ needs.build.result }}
          RELEASE: ${{ needs.release.result }}
          META: ${{ needs.update-meta.result }}
          CLEANUP: ${{ needs.cleanup.result }}
        run: |
          chmod +x scripts/utilities/notify.sh
          bash scripts/utilities/notify.sh
