name: 🔄 Sync & Build

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even without updates? (true/false)'
        required: false
        default: 'false'
  schedule:
    - cron: "0 16 * * *"   # Daily at 16:00 UTC (13:00 BRT)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================
  # Step 1: Check if upstream has updates
  # ===========================================
  check-updates:
    permissions: write-all
    runs-on: ubuntu-latest
    outputs:
      SHOULD_BUILD: ${{ steps.check.outputs.SHOULD_BUILD }}
      PIKO_UPDATED: ${{ steps.check.outputs.PIKO_UPDATED }}
      MORPHE_UPDATED: ${{ steps.check.outputs.MORPHE_UPDATED }}
      IG_BASE_UPDATED: ${{ steps.check.outputs.IG_BASE_UPDATED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHOULD_BUILD=0
          PIKO_UPDATED=0
          MORPHE_UPDATED=0
          IG_BASE_UPDATED=0

          # Check if this is a forced build
          if [ "${{ inputs.force_build }}" = "true" ]; then
            echo "Force build requested"
            SHOULD_BUILD=1
          fi

          # Check piko patches version
          echo "=== Checking piko patches ==="
          CURRENT_PIKO=$(awk '/^\[Instagram-Piko\]/{found=1} found && /^patches-version = /{gsub(/"/, ""); print $3; exit}' config.toml)
          echo "Current piko version in config: $CURRENT_PIKO"

          LATEST_PIKO_TAG=$(curl -sL "https://api.github.com/repos/crimera/piko/releases?per_page=1" | jq -r '.[0].tag_name // empty' 2>/dev/null || echo "")
          echo "Latest piko release: $LATEST_PIKO_TAG"

          # Get current version from build.md
          if git checkout origin/update build.md 2>/dev/null && [ -f build.md ]; then
            LAST_BUILT_PIKO=$(grep -oP 'piko\s+\K[\w.-]+' build.md | head -1 || echo "")
            echo "Last built piko version: $LAST_BUILT_PIKO"
          else
            LAST_BUILT_PIKO=""
            echo "No previous build.md found — first build"
            SHOULD_BUILD=1
          fi

          if [ -n "$LATEST_PIKO_TAG" ] && [ "$LATEST_PIKO_TAG" != "$LAST_BUILT_PIKO" ]; then
            echo "⚠️  Piko update detected: $LAST_BUILT_PIKO → $LATEST_PIKO_TAG"
            PIKO_UPDATED=1
            SHOULD_BUILD=1
          else
            echo "✅ Piko is up to date"
          fi

          # Check Morphe patches
          echo ""
          echo "=== Checking Morphe patches ==="
          LATEST_MORPHE=$(curl -sL "https://api.github.com/repos/MorpheApp/morphe-patches/releases?per_page=1" | jq -r '.[0].tag_name // empty' 2>/dev/null || echo "")
          echo "Latest morphe release: $LATEST_MORPHE"

          # Check Instagram base version on uptodown
          echo ""
          echo "=== Checking Instagram base version ==="
          CURRENT_IG_VER=$(awk '/^\[Instagram-Piko\]/{found=1} found && /^version = /{gsub(/"/, ""); print $3; exit}' config.toml)
          echo "Current pinned version: $CURRENT_IG_VER"

          IG_VERSIONS=$(curl -sL "https://instagram.en.uptodown.com/android/versions" 2>/dev/null | \
            grep -oP '(?<=version">)[\d.]+(?:\.\d+)+' | head -5) || true

          if [ -n "$IG_VERSIONS" ]; then
            LATEST_IG=$(echo "$IG_VERSIONS" | head -1)
            echo "Latest on uptodown: $LATEST_IG"
            if [ "$LATEST_IG" != "$CURRENT_IG_VER" ]; then
              echo "⚠️  Instagram base update: $CURRENT_IG_VER → $LATEST_IG"
              echo "  (Won't auto-update — piko must support it first)"
              IG_BASE_UPDATED=1
            else
              echo "✅ Instagram base is up to date"
            fi
          fi

          # Use build.sh config-update check for Morphe
          if [ -f build.sh ]; then
            chmod +x build.sh utils.sh
            UPDATE_CFG=$(./build.sh config.toml --config-update 2>/dev/null || true)
            if [ -n "$UPDATE_CFG" ]; then
              echo "⚠️  Config updates detected: $UPDATE_CFG"
              MORPHE_UPDATED=1
              SHOULD_BUILD=1
            else
              echo "✅ Morphe patches are up to date"
            fi
          fi

          echo ""
          echo "=== Summary ==="
          echo "Piko updated: $PIKO_UPDATED"
          echo "Morphe updated: $MORPHE_UPDATED"
          echo "IG base updated: $IG_BASE_UPDATED"
          echo "Should build: $SHOULD_BUILD"

          echo "SHOULD_BUILD=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "PIKO_UPDATED=$PIKO_UPDATED" >> $GITHUB_OUTPUT
          echo "MORPHE_UPDATED=$MORPHE_UPDATED" >> $GITHUB_OUTPUT
          echo "IG_BASE_UPDATED=$IG_BASE_UPDATED" >> $GITHUB_OUTPUT

  # ===========================================
  # Step 2: Sync piko fork + apply overlay
  # ===========================================
  sync-piko:
    needs: check-updates
    if: needs.check-updates.outputs.PIKO_UPDATED == '1'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout rvcbotbuilds
        uses: actions/checkout@v6

      - name: Checkout piko fork
        uses: actions/checkout@v6
        with:
          repository: Chrispsz/piko
          ref: main
          path: piko-fork
          fetch-depth: 0

      - name: Add upstream remote
        working-directory: piko-fork
        run: |
          git remote add upstream https://github.com/crimera/piko.git
          git fetch upstream main --depth=50

      - name: Merge upstream (keeping our changes)
        working-directory: piko-fork
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Try merge with our changes taking priority
          git merge upstream/main --no-edit -X ours || {
            echo "⚠️  Merge conflicts detected, resolving with ours strategy"
            git diff --name-only --diff-filter=U | while read file; do
              echo "  Resolving conflict in $file (keeping ours)"
              git checkout --ours "$file"
              git add "$file"
            done
            git commit --no-edit || true
          }

      - name: Apply immutable overlay
        run: |
          chmod +x overlay/apply-overlay.sh
          bash overlay/apply-overlay.sh piko-fork

          cd piko-fork
          git diff --stat
          git add -A
          git diff --cached --quiet || git commit -m "chore: reapply immutable overlay after upstream sync"
          git push

  # ===========================================
  # Step 3: Build Instagram (if needed)
  # ===========================================
  build-instagram:
    needs: [check-updates, sync-piko]
    if: needs.check-updates.outputs.SHOULD_BUILD == '1'
    uses: ./.github/workflows/release-instagram.yml
    with:
      prerelease: 'false'
    secrets: inherit

  # ===========================================
  # Step 4: Build YouTube/Music (if Morphe updated)
  # ===========================================
  build-youtube-music:
    needs: check-updates
    if: needs.check-updates.outputs.MORPHE_UPDATED == '1'
    uses: ./.github/workflows/build.yml
    with:
      build_target: 'all'
    secrets: inherit

  # ===========================================
  # Step 5: Post-build cleanup
  # ===========================================
  post-build:
    needs: [check-updates, build-instagram]
    if: always() && needs.check-updates.outputs.SHOULD_BUILD == '1'
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout update branch
        uses: actions/checkout@v6
        with:
          ref: update
          fetch-depth: 0

      - name: Download build log
        uses: actions/download-artifact@v4
        with:
          name: build-log
          path: build-meta/

      - name: Update build.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f build-meta/build.md ]; then
            cp build-meta/build.md build.md
            git add build.md
            git diff --cached --quiet || git commit -m "chore: update build.md [skip ci]"
            git push
          fi

      - name: Clean old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep only last 5 runs per workflow
          for wf_id in $(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows" | \
            jq -r '.workflows[].id'); do
            runs=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/$wf_id/runs?per_page=100" | \
              jq -r '[.workflow_runs[] | select(.conclusion != "in_progress")] | sort_by(.created_at) | reverse | .[5:] | .[].id')
            for run_id in $runs; do
              curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/$run_id" || true
            done
          done
          echo "Old runs cleaned"
