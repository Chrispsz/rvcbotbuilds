name: CI — Auto-detect patches & base updates

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"   # Daily at 16:00 UTC (13:00 BRT)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # Check for updates in piko patches (Instagram)
  # and Morphe patches (YouTube/Music)
  # The config_update function in build.sh already handles
  # checking both patch sources (dev channel for piko, latest for Morphe)
  # ============================================================
  check:
    permissions: write-all
    runs-on: ubuntu-latest
    outputs:
      SHOULD_BUILD: ${{ steps.should_build.outputs.SHOULD_BUILD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Should build?
        id: should_build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if this is first build (no build.md on update branch)
          if ! git checkout origin/update build.md 2>/dev/null; then
            echo "first time building!"
            echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Use the standard config_update mechanism from build.sh
          # This checks:
          #   - piko patches (dev channel) for Instagram
          #   - Morphe patches (latest) for YouTube/Music
          #   - Base APK versions for all apps
          chmod +x build.sh utils.sh
          UPDATE_CFG=$(./build.sh config.toml --config-update)
          if [ "$UPDATE_CFG" ]; then
            echo "Updates detected!"
            echo "'$UPDATE_CFG'"
            echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
          else
            echo "No updates found."
            echo "SHOULD_BUILD=0" >> $GITHUB_OUTPUT
          fi

      - name: Check patches versions (info)
        if: steps.should_build.outputs.SHOULD_BUILD == '1'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Piko patches (Instagram) ==="
          curl -sL -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/crimera/piko/releases?per_page=3" | \
            jq -r '.[] | "  \(.tag_name) — \(.published_at[:10]) — \(.name)"' | head -3
          echo ""
          echo "=== Morphe patches (YouTube/Music) ==="
          curl -sL -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/MorpheApp/morphe-patches/releases?per_page=3" | \
            jq -r '.[] | "  \(.tag_name) — \(.published_at[:10]) — \(.name)"' | head -3

      - name: Clear older runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list -L400 --json databaseId -q '.[].databaseId' | tail -n+10 | xargs -IID gh api "repos/$GITHUB_REPOSITORY/actions/runs/ID" -X DELETE || :

  # ============================================================
  # Trigger build if updates found
  # ============================================================
  build:
    needs: check
    if: ${{ needs.check.outputs.SHOULD_BUILD == '1' }}
    uses: ./.github/workflows/build.yml
    secrets: inherit

  # ============================================================
  # Post-build: update build.md on the update branch
  # ============================================================
  post-build:
    needs: [check, build]
    if: ${{ always() && needs.check.outputs.SHOULD_BUILD == '1' }}
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout update branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: update

      - name: Download build metadata
        uses: actions/download-artifact@v4
        with:
          name: build-log
          path: build-meta/

      - name: Update build.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f build-meta/build.md ]; then
            cp build-meta/build.md build.md
            git add build.md
            git diff --cached --quiet || git commit -m "chore: update build.md [skip ci]"
            git push
          fi
