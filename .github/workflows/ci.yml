name: CI — Auto-detect patches & base updates

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"   # Daily at 16:00 UTC (13:00 BRT)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    permissions: write-all
    runs-on: ubuntu-latest
    outputs:
      SHOULD_BUILD: ${{ steps.should_build.outputs.SHOULD_BUILD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Should build?
        id: should_build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git checkout origin/update build.md 2>/dev/null; then
            echo "First time building!"
            echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
            exit 0
          fi

          chmod +x build.sh utils.sh
          UPDATE_CFG=$(./build.sh config.toml --config-update)
          if [ "$UPDATE_CFG" ]; then
            echo "Updates detected!"
            echo "'$UPDATE_CFG'"
            echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
          else
            echo "No patch updates found."
          fi

          # Check Instagram base version on uptodown
          echo ""
          echo "=== Checking Instagram base version ==="
          CURRENT_IG_VER=$(grep '^version = ' config.toml | head -1 | tr -d '"' | awk '{print $3}')
          echo "Current pinned version: $CURRENT_IG_VER"

          IG_VERSIONS=$(curl -sL "https://instagram.en.uptodown.com/android/versions" 2>/dev/null | \
            grep -oP '(?<=version">)[\d.]+(?:\.\d+)+' | head -5) || true

          if [ -n "$IG_VERSIONS" ]; then
            LATEST_IG=$(echo "$IG_VERSIONS" | head -1)
            echo "Latest on uptodown: $LATEST_IG"
            if [ "$LATEST_IG" != "$CURRENT_IG_VER" ]; then
              echo "⚠️  Instagram base update available: $CURRENT_IG_VER → $LATEST_IG"
              echo "  (Will not auto-update — piko must add support first)"
            else
              echo "✅ Instagram base is up to date"
            fi
          fi

          # Only build if patches updated
          if [ "$(grep -c 'SHOULD_BUILD=1' $GITHUB_OUTPUT 2>/dev/null)" -eq 0 ]; then
            echo "SHOULD_BUILD=0" >> $GITHUB_OUTPUT
          fi

      - name: Check patches versions
        if: steps.should_build.outputs.SHOULD_BUILD == '1'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Piko patches (Instagram) ==="
          curl -sL -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/crimera/piko/releases?per_page=3" | \
            jq -r '.[] | "  \(.tag_name) — \(.published_at[:10]) — \(.name)"' | head -3
          echo ""
          echo "=== Morphe patches (YouTube/Music) ==="
          curl -sL -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/MorpheApp/morphe-patches/releases?per_page=3" | \
            jq -r '.[] | "  \(.tag_name) — \(.published_at[:10]) — \(.name)"' | head -3

      - name: Clear older runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list -L400 --json databaseId -q '.[].databaseId' | tail -n+10 | xargs -IID gh api "repos/$GITHUB_REPOSITORY/actions/runs/ID" -X DELETE || :

  build:
    needs: check
    if: ${{ needs.check.outputs.SHOULD_BUILD == '1' }}
    uses: ./.github/workflows/build.yml
    with:
      build_target: 'all'
    secrets: inherit

  post-build:
    needs: [check, build]
    if: ${{ always() && needs.check.outputs.SHOULD_BUILD == '1' }}
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout update branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: update

      - name: Download build metadata
        uses: actions/download-artifact@v4
        with:
          name: build-log
          path: build-meta/

      - name: Update build.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f build-meta/build.md ]; then
            cp build-meta/build.md build.md
            git add build.md
            git diff --cached --quiet || git commit -m "chore: update build.md [skip ci]"
            git push
          fi
