name: 🔄 CI — Smart Build & Release

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build all? (true/false)'
        required: false
        default: 'false'
      force_target:
        description: 'Force specific target? (all/instagram/youtube)'
        required: false
        default: 'all'
  schedule:
    - cron: "0 16 * * *"   # Daily at 16:00 UTC (13:00 BRT)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================
  # Step 1: Check what needs updating
  # ===========================================
  check-updates:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      BUILD_INSTAGRAM: ${{ steps.check.outputs.BUILD_INSTAGRAM }}
      BUILD_YOUTUBE: ${{ steps.check.outputs.BUILD_YOUTUBE }}
      SYNC_UPSTREAM: ${{ steps.check.outputs.SYNC_UPSTREAM }}
      PIKO_VERSION: ${{ steps.check.outputs.PIKO_VERSION }}
      MORPHE_VERSION: ${{ steps.check.outputs.MORPHE_VERSION }}
      IG_VERSION: ${{ steps.check.outputs.IG_VERSION }}
      YT_VERSION: ${{ steps.check.outputs.YT_VERSION }}
      UPSTREAM_JHC_SHA: ${{ steps.check.outputs.UPSTREAM_JHC_SHA }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: sudo apt-get install -y jq

      - name: Check for updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_INSTAGRAM=0
          BUILD_YOUTUBE=0
          SYNC_UPSTREAM=0

          # ---- Read enabled flags from config.toml ----
          YT_ENABLED=$(grep -A1 '\[YouTube-Morphe\]' config.toml | grep -oP 'enabled\s*=\s*\K(true|false)' || echo "true")
          MUSIC_ENABLED=$(grep -A1 '\[Music-Morphe\]' config.toml | grep -oP 'enabled\s*=\s*\K(true|false)' || echo "true")
          IG_ENABLED=$(grep -A1 '\[Instagram-Piko\]' config.toml | grep -oP 'enabled\s*=\s*\K(true|false)' || echo "true")
          echo "Config enabled: YouTube=$YT_ENABLED, Music=$MUSIC_ENABLED, Instagram=$IG_ENABLED"

          # Force build handling (respect config.toml enabled flags)
          if [ "${{ inputs.force_build }}" = "true" ]; then
            echo "⚡ Force build requested — respecting config.toml enabled flags"
            [ "$IG_ENABLED" = "true" ] && BUILD_INSTAGRAM=1
            [ "$YT_ENABLED" = "true" ] && BUILD_YOUTUBE=1
          fi

          if [ "${{ inputs.force_target }}" = "instagram" ] && [ "$IG_ENABLED" = "true" ]; then
            BUILD_INSTAGRAM=1
          elif [ "${{ inputs.force_target }}" = "youtube" ] && [ "$YT_ENABLED" = "true" ]; then
            BUILD_YOUTUBE=1
          fi

          # ---- Check upstream j-hc/revanced-magisk-module ----
          echo "=== Checking upstream j-hc/revanced-magisk-module ==="
          UPSTREAM_JHC_SHA=$(curl -sL "https://api.github.com/repos/j-hc/revanced-magisk-module/commits/master" | jq -r '.sha // empty' 2>/dev/null || echo "")
          echo "Upstream j-hc HEAD: ${UPSTREAM_JHC_SHA:0:8}"

          LAST_JHC_SHA=""
          if git fetch origin update --depth=1 2>/dev/null; then
            LAST_JHC_SHA=$(git show origin/update:build-meta/jhc-upstream-sha.txt 2>/dev/null || echo "")
          fi
          echo "Last synced j-hc: ${LAST_JHC_SHA:0:8}"

          if [ -z "$LAST_JHC_SHA" ]; then
            echo "🆕 First sync — will merge from j-hc"
            SYNC_UPSTREAM=1
          elif [ -n "$UPSTREAM_JHC_SHA" ] && [ "$UPSTREAM_JHC_SHA" != "$LAST_JHC_SHA" ]; then
            echo "⚠️  Upstream j-hc has new commits: ${LAST_JHC_SHA:0:8} → ${UPSTREAM_JHC_SHA:0:8}"
            SYNC_UPSTREAM=1
          else
            echo "✅ Upstream j-hc up to date"
          fi

          # ---- Check Piko patches (Instagram) — official upstream only ----
          echo ""
          echo "=== Checking piko patches (crimera/piko) ==="
          PIKO_VERSION=$(curl -sL "https://api.github.com/repos/crimera/piko/releases?per_page=1" | jq -r '.[0].tag_name // empty' 2>/dev/null || echo "")
          echo "Latest upstream piko: $PIKO_VERSION"

          LAST_PIKO=""
          if git fetch origin update --depth=1 2>/dev/null; then
            LAST_PIKO=$(git show origin/update:build-meta/instagram-version.txt 2>/dev/null || echo "")
          fi
          echo "Last built piko: $LAST_PIKO"

          if [ -z "$LAST_PIKO" ] && [ "$IG_ENABLED" = "true" ]; then
            echo "🆕 First build — Instagram will be built"
            BUILD_INSTAGRAM=1
          elif [ -n "$PIKO_VERSION" ] && [ "$PIKO_VERSION" != "$LAST_PIKO" ] && [ "$IG_ENABLED" = "true" ]; then
            echo "⚠️  Piko update: $LAST_PIKO → $PIKO_VERSION"
            BUILD_INSTAGRAM=1
          else
            echo "✅ Piko up to date"
          fi

          # If upstream j-hc changed, also rebuild YouTube
          if [ "$SYNC_UPSTREAM" -eq 1 ] && [ "$YT_ENABLED" = "true" ]; then
            echo "🔄 Upstream sync needed — YouTube will be rebuilt with updated build system"
            BUILD_YOUTUBE=1
          fi

          # ---- Check Instagram base APK version ----
          echo ""
          echo "=== Checking Instagram base ==="
          IG_VERSION=$(curl -sL "https://instagram.en.uptodown.com/android/versions" 2>/dev/null | \
            grep -oP '(?<=version">)[\d.]+(?:\.\d+)+' | head -1 || echo "")
          echo "Latest IG on uptodown: $IG_VERSION"

          LAST_IG=""
          if git fetch origin update --depth=1 2>/dev/null; then
            LAST_IG=$(git show origin/update:build-meta/ig-base-version.txt 2>/dev/null || echo "")
          fi
          if [ -z "$LAST_IG" ] && [ -n "$IG_VERSION" ] && [ "$IG_ENABLED" = "true" ]; then
            echo "🆕 First IG base check — Instagram will be built"
            BUILD_INSTAGRAM=1
          elif [ -n "$IG_VERSION" ] && [ "$IG_VERSION" != "$LAST_IG" ] && [ "$IG_ENABLED" = "true" ]; then
            echo "⚠️  IG base update: $LAST_IG → $IG_VERSION"
            BUILD_INSTAGRAM=1
          fi

          # ---- Check Morphe patches (YouTube + Music) ----
          echo ""
          echo "=== Checking Morphe patches ==="
          MORPHE_VERSION=$(curl -sL "https://api.github.com/repos/MorpheApp/morphe-patches/releases?per_page=1" | jq -r '.[0].tag_name // empty' 2>/dev/null || echo "")
          echo "Latest Morphe: $MORPHE_VERSION"

          LAST_MORPHE=""
          if git fetch origin update --depth=1 2>/dev/null; then
            LAST_MORPHE=$(git show origin/update:build-meta/morphe-version.txt 2>/dev/null || echo "")
          fi
          echo "Last built Morphe: $LAST_MORPHE"

          if [ -z "$LAST_MORPHE" ] && [ "$YT_ENABLED" = "true" ]; then
            echo "🆕 First build — YouTube/Music will be built"
            BUILD_YOUTUBE=1
          elif [ -n "$MORPHE_VERSION" ] && [ "$MORPHE_VERSION" != "$LAST_MORPHE" ] && [ "$YT_ENABLED" = "true" ]; then
            echo "⚠️  Morphe update: $LAST_MORPHE → $MORPHE_VERSION"
            BUILD_YOUTUBE=1
          else
            echo "✅ Morphe up to date"
          fi

          # ---- Check YouTube base APK ----
          echo ""
          echo "=== Checking YouTube base ==="
          YT_VERSION=$(curl -sL "https://youtube.en.uptodown.com/android/versions" 2>/dev/null | \
            grep -oP '(?<=version">)[\d.]+(?:\.\d+)+' | head -1 || echo "")
          echo "Latest YT on uptodown: $YT_VERSION"

          LAST_YT=""
          if git fetch origin update --depth=1 2>/dev/null; then
            LAST_YT=$(git show origin/update:build-meta/yt-base-version.txt 2>/dev/null || echo "")
          fi
          if [ -z "$LAST_YT" ] && [ -n "$YT_VERSION" ] && [ "$YT_ENABLED" = "true" ]; then
            echo "🆕 First YT base check — YouTube will be built"
            BUILD_YOUTUBE=1
          elif [ -n "$YT_VERSION" ] && [ "$YT_VERSION" != "$LAST_YT" ] && [ "$YT_ENABLED" = "true" ]; then
            echo "⚠️  YT base update: $LAST_YT → $YT_VERSION"
            BUILD_YOUTUBE=1
          fi

          # ---- Summary ----
          echo ""
          echo "============================================"
          echo "  Build Decision"
          echo "============================================"
          echo "  Sync j-hc upstream: $([ $SYNC_UPSTREAM -eq 1 ] && echo '🔄 SYNC' || echo '✅ Up to date')"
          echo "  Instagram:          $([ $BUILD_INSTAGRAM -eq 1 ] && echo '🔨 BUILD' || echo '⏭️  SKIP')"
          echo "  YouTube:            $([ $BUILD_YOUTUBE -eq 1 ] && echo '🔨 BUILD' || echo '⏭️  SKIP')"
          echo "============================================"

          echo "BUILD_INSTAGRAM=$BUILD_INSTAGRAM" >> $GITHUB_OUTPUT
          echo "BUILD_YOUTUBE=$BUILD_YOUTUBE" >> $GITHUB_OUTPUT
          echo "SYNC_UPSTREAM=$SYNC_UPSTREAM" >> $GITHUB_OUTPUT
          echo "PIKO_VERSION=$PIKO_VERSION" >> $GITHUB_OUTPUT
          echo "MORPHE_VERSION=$MORPHE_VERSION" >> $GITHUB_OUTPUT
          echo "IG_VERSION=${IG_VERSION:-}" >> $GITHUB_OUTPUT
          echo "YT_VERSION=${YT_VERSION:-}" >> $GITHUB_OUTPUT
          echo "UPSTREAM_JHC_SHA=${UPSTREAM_JHC_SHA:-}" >> $GITHUB_OUTPUT

  # ===========================================
  # Step 2: Sync upstream j-hc/revanced-magisk-module
  # Keeps build system (build.sh, utils.sh, module/, bin/)
  # up to date automatically.
  # Our custom files (config.toml, workflows) are
  # preserved with -X ours merge strategy.
  # ===========================================
  sync-upstream:
    needs: check-updates
    if: needs.check-updates.outputs.SYNC_UPSTREAM == '1'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout rvcbotbuilds
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/j-hc/revanced-magisk-module.git 2>/dev/null || true
          git fetch upstream master --depth=100

      - name: Merge upstream (keeping our changes)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save our custom files before merge
          echo "📦 Backing up our custom files..."
          mkdir -p /tmp/our-backup
          cp config.toml /tmp/our-backup/config.toml 2>/dev/null || true
          cp -r .github/workflows/ /tmp/our-backup/workflows/ 2>/dev/null || true
          cp diagnose-build.sh /tmp/our-backup/diagnose-build.sh 2>/dev/null || true
          cp -r ksu_profile/ /tmp/our-backup/ksu_profile/ 2>/dev/null || true

          # Merge with -X ours (our changes win on conflicts)
          git merge upstream/master --no-edit -X ours || {
            echo "⚠️  Merge conflicts — resolving with ours strategy"
            git diff --name-only --diff-filter=U | while read file; do
              echo "  Keeping ours: $file"
              git checkout --ours "$file"
              git add "$file"
            done
            git commit --no-edit || true
          }

          # Restore our protected files
          echo "📦 Restoring our custom files..."
          if [ -f /tmp/our-backup/config.toml ]; then
            cp /tmp/our-backup/config.toml config.toml
            echo "  ✅ config.toml restored"
          fi
          if [ -d /tmp/our-backup/workflows ]; then
            rm -rf .github/workflows/
            cp -r /tmp/our-backup/workflows/ .github/workflows/
            echo "  ✅ .github/workflows/ restored"
          fi
          if [ -f /tmp/our-backup/diagnose-build.sh ]; then
            cp /tmp/our-backup/diagnose-build.sh diagnose-build.sh
            chmod +x diagnose-build.sh
            echo "  ✅ diagnose-build.sh restored"
          fi
          if [ -d /tmp/our-backup/ksu_profile ]; then
            rm -rf ksu_profile/
            cp -r /tmp/our-backup/ksu_profile/ ksu_profile/
            echo "  ✅ ksu_profile/ restored"
          fi

          # Commit our protected file restores
          git add -A
          git diff --cached --quiet || git commit -m "chore: restore custom config and workflows after j-hc sync"

          # Show what changed
          echo ""
          echo "=== Merge summary ==="
          git log --oneline -5
          echo ""
          echo "=== Files updated from upstream ==="
          git diff --stat HEAD~1 HEAD 2>/dev/null || echo "(single commit)"

      - name: Push merged changes
        run: |
          git push

  # ===========================================
  # Step 3: Build Instagram (conditional)
  # Uses official crimera/piko .mpp directly — no fork, no overlay
  # ===========================================
  build-instagram:
    needs: [check-updates, sync-upstream]
    if: always() && needs.check-updates.outputs.BUILD_INSTAGRAM == '1'
    uses: ./.github/workflows/build-instagram.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      KS_KEYSTORE_B64: ${{ secrets.KS_KEYSTORE_B64 }}
      KS_P12_KEYSTORE_B64: ${{ secrets.KS_P12_KEYSTORE_B64 }}
      KS_PASSWORD: ${{ secrets.KS_PASSWORD }}

  # ===========================================
  # Step 4: Build YouTube + Music (conditional)
  # ===========================================
  build-youtube:
    needs: [check-updates, sync-upstream]
    if: always() && needs.check-updates.outputs.BUILD_YOUTUBE == '1'
    uses: ./.github/workflows/build-youtube.yml
    secrets:
      KS_KEYSTORE_B64: ${{ secrets.KS_KEYSTORE_B64 }}
      KS_P12_KEYSTORE_B64: ${{ secrets.KS_P12_KEYSTORE_B64 }}
      KS_PASSWORD: ${{ secrets.KS_PASSWORD }}

  # ===========================================
  # Step 5: Create unified release
  # ===========================================
  release:
    needs: [check-updates, build-instagram, build-youtube]
    if: always() && (needs.build-instagram.result == 'success' || needs.build-youtube.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get install -y jq

      # --- Download freshly built artifacts ---

      - name: Download Instagram APK
        if: needs.build-instagram.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: instagram-mod-apk
          path: release-assets/

      - name: Download YouTube APK
        if: needs.build-youtube.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: youtube-mod-apk
          path: release-assets/
        continue-on-error: true

      - name: Download YouTube Magisk Module
        if: needs.build-youtube.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: youtube-magisk-module
          path: release-assets/
        continue-on-error: true

      - name: Download Music APK
        if: needs.build-youtube.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: music-mod-apk
          path: release-assets/
        continue-on-error: true

      # --- Fetch previous release assets for unchanged apps ---

      - name: Carry forward unchanged assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets

          # Get previous release assets list
          PREV_RELEASE=$(curl -sL "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/latest" 2>/dev/null || echo "")

          # If Instagram wasn't rebuilt, carry forward
          if [ "${{ needs.build-instagram.result }}" != "success" ]; then
            echo "📸 Instagram not rebuilt — fetching previous APK..."
            PREV_URL=$(echo "$PREV_RELEASE" | jq -r '.assets[] | select(.name | test("instagram.*\\.apk")) | .url' | head -1 || true)
            if [ -n "$PREV_URL" ]; then
              curl -sL -H "Accept: application/octet-stream" -H "Authorization: Bearer $GITHUB_TOKEN" \
                -o "release-assets/instagram-carried.apk" "$PREV_URL" 2>/dev/null
              echo "✅ Fetched previous Instagram APK"
            else
              echo "⚠️  No previous Instagram APK found"
            fi
          fi

          # If YouTube wasn't rebuilt, carry forward APK + Magisk module
          if [ "${{ needs.build-youtube.result }}" != "success" ]; then
            echo "📺 YouTube not rebuilt — fetching previous assets..."

            # YouTube APK
            PREV_URL=$(echo "$PREV_RELEASE" | jq -r '.assets[] | select(.name | test("youtube.*\\.apk")) | .url' | head -1 || true)
            if [ -n "$PREV_URL" ]; then
              curl -sL -H "Accept: application/octet-stream" -H "Authorization: Bearer $GITHUB_TOKEN" \
                -o "release-assets/youtube-carried.apk" "$PREV_URL" 2>/dev/null
              echo "✅ Fetched previous YouTube APK"
            fi

            # YouTube Magisk Module
            PREV_URL=$(echo "$PREV_RELEASE" | jq -r '.assets[] | select(.name | test("youtube.*\\.zip")) | .url' | head -1 || true)
            if [ -n "$PREV_URL" ]; then
              curl -sL -H "Accept: application/octet-stream" -H "Authorization: Bearer $GITHUB_TOKEN" \
                -o "release-assets/youtube-magisk-carried.zip" "$PREV_URL" 2>/dev/null
              echo "✅ Fetched previous YouTube Magisk Module"
            fi

            # Music APK
            PREV_URL=$(echo "$PREV_RELEASE" | jq -r '.assets[] | select(.name | test("music.*\\.apk")) | .url' | head -1 || true)
            if [ -n "$PREV_URL" ]; then
              curl -sL -H "Accept: application/octet-stream" -H "Authorization: Bearer $GITHUB_TOKEN" \
                -o "release-assets/music-carried.apk" "$PREV_URL" 2>/dev/null
              echo "✅ Fetched previous Music APK"
            fi
          fi

          echo ""
          echo "=== Release assets ==="
          ls -la release-assets/ 2>/dev/null || echo "No assets!"

      - name: Generate tag & release notes
        id: release-meta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate tag with build number: v2025.05.29-1, v2025.05.29-2, etc.
          BASE_TAG="v$(date +'%Y.%m.%d')"
          BUILD_NUM=1

          # Check if a release with today's date already exists
          EXISTING_TAGS=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" | \
            jq -r ".[].tag_name | select(startswith(\"$BASE_TAG\"))" 2>/dev/null || echo "")

          if [ -n "$EXISTING_TAGS" ]; then
            # Find the highest build number for today
            HIGHEST=0
            while IFS= read -r t; do
              NUM=$(echo "$t" | sed "s/${BASE_TAG}-//" 2>/dev/null || echo "0")
              NUM=${NUM:-0}
              if [ "$NUM" -gt "$HIGHEST" ] 2>/dev/null; then
                HIGHEST=$NUM
              fi
            done <<< "$EXISTING_TAGS"
            BUILD_NUM=$((HIGHEST + 1))
          fi

          DATE_TAG="${BASE_TAG}-${BUILD_NUM}"
          echo "tag=$DATE_TAG" >> $GITHUB_OUTPUT
          echo "📋 Release tag: $DATE_TAG (build $BUILD_NUM of the day)"

          SYNC_STATUS="⏭️ No sync needed"
          if [ "${{ needs.check-updates.outputs.SYNC_UPSTREAM }}" = "1" ]; then
            SYNC_STATUS="🔄 Synced from j-hc"
          fi

          IG_STATUS="⏭️ Unchanged"
          IG_DETAIL="Carried from previous release"
          if [ "${{ needs.build-instagram.result }}" = "success" ]; then
            IG_STATUS="🔨 Rebuilt"
            IG_DETAIL="Piko ${{ needs.check-updates.outputs.PIKO_VERSION }} · Base ${{ needs.check-updates.outputs.IG_VERSION || '—' }}"
          fi

          YT_STATUS="⏭️ Unchanged"
          YT_DETAIL="Carried from previous release"
          if [ "${{ needs.build-youtube.result }}" = "success" ]; then
            YT_STATUS="🔨 Rebuilt"
            YT_DETAIL="Morphe ${{ needs.check-updates.outputs.MORPHE_VERSION }} · Base ${{ needs.check-updates.outputs.YT_VERSION || '—' }}"
          fi

          MU_STATUS="⏭️ Unchanged"
          MU_DETAIL="Carried from previous release"
          if [ "${{ needs.build-youtube.result }}" = "success" ]; then
            MU_STATUS="🔨 Rebuilt"
            MU_DETAIL="Morphe ${{ needs.check-updates.outputs.MORPHE_VERSION }}"
          fi

          {
            echo "🚀 RVCArise — $(date +'%d/%m/%Y')"
            echo ""
            echo "🔄 Build system — ${SYNC_STATUS}"
            echo ""
            echo "📸 Instagram — ${IG_STATUS}"
            echo "   ${IG_DETAIL}"
            echo "📺 YouTube — ${YT_STATUS}"
            echo "   ${YT_DETAIL}"
            echo "🎵 Music — ${MU_STATUS}"
            echo "   ${MU_DETAIL}"
            echo ""
            echo "---"
            echo ""
            echo "📸 Instagram"
            echo "Official crimera/piko · 11 patches · AMOLED · Download · Privacy"
            echo ""
            echo "📺 YouTube"
            echo "AMOLED · Clean player · APK + Magisk"
            echo ""
            echo "🎵 Music"
            echo "AMOLED · Clean player · APK"
            echo ""
            echo "---"
            echo ""
            echo "🔧 Smart CI — daily 13:00 BRT"
            echo "• Auto-sync from j-hc/revanced-magisk-module"
            echo "• Only changed apps are rebuilt"
            echo "• YouTube Magisk included"
            echo "• Previous assets carried forward"
          } > release-notes.md

          cat release-notes.md

      - name: Mark old releases as prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark older same-day releases as prerelease (keep history, avoid confusion)
          BASE_TAG="v$(date +'%Y.%m.%d')"
          RELEASES=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" | \
            jq -c ".[] | select(.tag_name | startswith(\"$BASE_TAG\")) | {id: .id, tag: .tag_name, prerelease: .prerelease}" 2>/dev/null || echo "")

          while IFS= read -r rel; do
            [ -z "$rel" ] && continue
            REL_ID=$(echo "$rel" | jq -r '.id')
            IS_PRE=$(echo "$rel" | jq -r '.prerelease')
            if [ "$IS_PRE" = "false" ]; then
              echo "Marking old release $REL_ID as prerelease"
              curl -s -X PATCH -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"prerelease": true}' \
                "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$REL_ID" > /dev/null
            fi
          done <<< "$RELEASES"

          # Delete releases older than 7 days to keep repo clean
          CUTOFF=$(date -d '7 days ago' +'%Y-%m-%d' 2>/dev/null || date -v-7d +'%Y-%m-%d' 2>/dev/null || echo "")
          if [ -n "$CUTOFF" ]; then
            ALL_RELEASES=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases?per_page=100" | \
              jq -c ".[] | {id: .id, tag: .tag_name}" 2>/dev/null || echo "")
            while IFS= read -r rel; do
              [ -z "$rel" ] && continue
              REL_TAG=$(echo "$rel" | jq -r '.tag')
              REL_ID=$(echo "$rel" | jq -r '.id')
              # Extract date from tag: v2025.05.29-1 → 2025.05.29
              REL_DATE=$(echo "$REL_TAG" | sed 's/v//; s/-[0-9]*$//' | tr '.' '-')
              if [ "$REL_DATE" "<" "$CUTOFF" ] 2>/dev/null; then
                echo "Deleting old release $REL_ID ($REL_TAG)"
                curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$REL_ID" > /dev/null
                curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/$GITHUB_REPOSITORY/git/refs/tags/$REL_TAG" > /dev/null || true
              fi
            done <<< "$ALL_RELEASES"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag }}
          name: "📦 Mod Builds ${{ steps.release-meta.outputs.tag }}"
          body_path: release-notes.md
          files: |
            release-assets/*.apk
            release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # Step 6: Update build metadata
  # ===========================================
  update-meta:
    needs: [check-updates, release]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout update branch
        uses: actions/checkout@v4
        with:
          ref: update
          fetch-depth: 0

      - name: Update version tracking files
        run: |
          mkdir -p build-meta

          # Update j-hc upstream SHA
          if [ -n "${{ needs.check-updates.outputs.UPSTREAM_JHC_SHA }}" ]; then
            echo "${{ needs.check-updates.outputs.UPSTREAM_JHC_SHA }}" > build-meta/jhc-upstream-sha.txt
          fi

          if [ "${{ needs.check-updates.outputs.BUILD_INSTAGRAM }}" = "1" ] && [ -n "${{ needs.check-updates.outputs.PIKO_VERSION }}" ]; then
            echo "${{ needs.check-updates.outputs.PIKO_VERSION }}" > build-meta/instagram-version.txt
          fi
          if [ -n "${{ needs.check-updates.outputs.IG_VERSION }}" ]; then
            echo "${{ needs.check-updates.outputs.IG_VERSION }}" > build-meta/ig-base-version.txt
          fi

          if [ "${{ needs.check-updates.outputs.BUILD_YOUTUBE }}" = "1" ] && [ -n "${{ needs.check-updates.outputs.MORPHE_VERSION }}" ]; then
            echo "${{ needs.check-updates.outputs.MORPHE_VERSION }}" > build-meta/morphe-version.txt
          fi
          if [ -n "${{ needs.check-updates.outputs.YT_VERSION }}" ]; then
            echo "${{ needs.check-updates.outputs.YT_VERSION }}" > build-meta/yt-base-version.txt
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update build metadata [skip ci]"
          git push

  # ===========================================
  # Step 7: Cleanup old workflow runs
  # ===========================================
  cleanup:
    needs: release
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Clean old runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for wf_id in $(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows" | \
            jq -r '.workflows[].id'); do
            runs=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/$wf_id/runs?per_page=100" | \
              jq -r '[.workflow_runs[] | select(.conclusion != "in_progress")] | sort_by(.created_at) | reverse | .[3:] | .[].id')
            for run_id in $runs; do
              curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/$run_id" || true
            done
          done
          echo "Cleanup done"
