name: Release Instagram Mod

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (e.g. v430.0.0.53.80-piko3.5.0-dev.2)'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release? (true/false)'
        required: false
        default: 'true'
      create_release:
        description: 'Create GitHub Release? (true/false)'
        required: false
        default: 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-instagram:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore keystores from secrets
        run: |
          echo "${{ secrets.KS_KEYSTORE_B64 }}" | base64 -d > ks.keystore
          echo "${{ secrets.KS_P12_KEYSTORE_B64 }}" | base64 -d > ks-p12.keystore
          chmod 644 ks.keystore ks-p12.keystore
          echo "Keystores restored from secrets"

      - name: Cache prebuilts
        uses: actions/cache@v4
        with:
          path: |
            temp/crimera-rv
          key: piko-prebuilts-v1-${{ github.run_id }}
          restore-keys: |
            piko-prebuilts-v1-

      - name: Install deps
        run: sudo apt-get install -y jq zip python3

      - name: Prepare Instagram-only config
        run: |
          # Disable YouTube and Music to build only Instagram
          sed -i '/^\[YouTube-Morphe\]/,/^\[Music-Morphe\]/{ s/^enabled = true/enabled = false/ }' config.toml
          sed -i '/^\[Music-Morphe\]/,/^\[Instagram-Piko\]/{ s/^enabled = true/enabled = false/ }' config.toml

          echo "=== Active config ==="
          grep -E '^\[.*\]|^enabled' config.toml

      - name: Build Instagram
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x build.sh utils.sh
          echo "=== Starting Instagram-only build ==="
          bash build.sh config.toml 2>&1 | tee build.log
          echo "=== Build complete ==="

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: instagram-piko-apk
          path: build/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: |
            build.md
            build.log
          retention-days: 7

      - name: Generate release tag and notes
        id: release_info
        if: inputs.create_release == 'true'
        run: |
          # Auto-generate tag if not provided
          if [ -n "${{ inputs.version_tag }}" ]; then
            TAG="${{ inputs.version_tag }}"
          else
            APK=$(ls build/instagram-*.apk 2>/dev/null | head -1)
            if [ -n "$APK" ]; then
              VER=$(basename "$APK" | grep -oP 'v[\d.]+')
              TAG="instagram-${VER}-piko"
            else
              TAG="instagram-$(date +'%Y%m%d-%H%M')"
            fi
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

          # Generate release notes from build.md + patch list
          {
            echo "## 📸 Instagram Piko Mod"
            echo ""
            echo "### Patches Applied"
            echo ""
            echo "**21 piko patches (crimera/piko v3.5.0-dev.2) + 2 custom RVCBotBuilds patches**"
            echo ""
            echo "| # | Patch | Category |"
            echo "|---|-------|----------|"
            echo "| 1 | Add settings | 🔧 Settings |"
            echo "| 2 | Amoled theme | 🖤 Theme |"
            echo "| 3 | Copy comment | 👤 Profile |"
            echo "| 4 | Disable analytics | 🛡️ Privacy |"
            echo "| 5 | Disable ads | 🚫 Ads |"
            echo "| 6 | Disable screenshot detection | 🛡️ Privacy |"
            echo "| 7 | Disable typing status | 🛡️ Privacy |"
            echo "| 8 | Download media | 📥 Download |"
            echo "| 9 | Download voice message | 📥 Download |"
            echo "| 10 | Follow back indicator | 👤 Profile |"
            echo "| 11 | Hide stories tray | 🧹 Clean |"
            echo "| 12 | Hide suggested content | 🚫 Ads |"
            echo "| 13 | Improve image viewing | 🔍 Quality |"
            echo "| 14 | Make ephemeral media permanent | 🔒 Media |"
            echo "| 15 | More options on post | 👤 Profile |"
            echo "| 16 | More options on profile | 👤 Profile |"
            echo "| 17 | Open links externally | 🔗 Links |"
            echo "| 18 | Remove build expired popup | 🧹 Clean |"
            echo "| 19 | Sanitize share links | 🔗 Links |"
            echo "| 20 | Unlock developer options | 🔧 Settings |"
            echo "| 21 | View story mentions | 🔒 Media |"
            echo ""
            echo "### Custom Patches (RVCBotBuilds binary patches)"
            echo ""
            echo "| # | Patch | Method | Effect |"
            echo "|---|-------|--------|--------|"
            echo "| 22 | Allow Screenshots in DMs | FLAG_SECURE removal (binary dex patch) | Screenshot em DMs liberado |"
            echo "| 23 | MobileConfig Quality Override | medium→high, standard→hd (binary string patch) | Qualidade de mídia maximizada |"
            echo ""
            echo "<details><summary>Patches excluídos (risky/detectable)</summary>"
            echo ""
            echo "- View DMs anonymously — Ghost mode em DMs (Instagram pode detectar, risco de ban)"
            echo "- View live anonymously — Mesmo risco de detecção"
            echo "- View stories anonymously — Alto risco de detecção, Meta monitora"
            echo "- Unlock employee options — Expõe ferramentas internas da Meta"
            echo "- Unlock Plus benefits — Violação de TOS, detectável"
            echo "- Limit feed to following profiles — Quebra algoritmo do feed"
            echo "- Hide navigation buttons — Pode quebrar UI, UX confuso"
            echo ""
            echo "</details>"
            echo ""
            if [ -f build.md ]; then
              echo "### Build Info"
              echo '```'
              cat build.md
              echo '```'
            fi
          } > release-notes.md

      - name: Create GitHub Release
        if: inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: "📸 Instagram Piko Mod ${{ steps.release_info.outputs.tag }}"
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease == 'true' }}
          files: |
            build/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        if: always()
        run: |
          echo "## 📸 Instagram Piko Mod Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls build/*.apk 2>/dev/null; then
            for apk in build/*.apk; do
              SIZE=$(du -h "$apk" | cut -f1)
              echo "- ✅ \`$(basename $apk)\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "- ❌ No APK built" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup keystores
        if: always()
        run: rm -f ks.keystore ks-p12.keystore
