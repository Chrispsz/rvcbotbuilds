name: 📸 Build Instagram Mod

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Pre-release? (true/false)'
        required: false
        default: 'false'
  workflow_call:
    inputs:
      prerelease:
        type: string
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore keystores
        run: |
          echo "${{ secrets.KS_KEYSTORE_B64 }}" | base64 -d > ks.keystore
          echo "${{ secrets.KS_P12_KEYSTORE_B64 }}" | base64 -d > ks-p12.keystore
          chmod 644 ks.keystore ks-p12.keystore

      - name: Cache prebuilts
        uses: actions/cache@v4
        with:
          path: temp/crimera-rv
          key: piko-prebuilts-v1-${{ github.run_id }}
          restore-keys: piko-prebuilts-v1-

      - name: Install deps
        run: sudo apt-get install -y jq zip python3

      - name: Prepare Instagram-only config
        run: |
          set_app_enabled() {
            local section="$1" state="$2"
            awk -v sec="[$section]" -v val="enabled = $state" '
              $0 == sec { in_sec=1; print; next }
              in_sec && /^enabled = / { print val; in_sec=0; next }
              in_sec && /^\[/ { in_sec=0 }
              { print }
            ' config.toml > config.toml.tmp && mv config.toml.tmp config.toml
          }
          set_app_enabled "YouTube-Morphe" false
          set_app_enabled "Music-Morphe" false
          echo "=== Active config ==="
          grep -E '^\[.*\]|^enabled' config.toml

      - name: Build Instagram
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x build.sh utils.sh
          bash build.sh config.toml 2>&1 | tee build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: instagram-mod-apk
          path: build/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: |
            build.md
            build.log
          retention-days: 7

      - name: Create GitHub Release
        id: release
        run: |
          APK=$(ls build/instagram-*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found, skipping release"
            echo "created=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract version from APK filename
          VER=$(basename "$APK" | sed -n 's/.*-v\([0-9][0-9.]*\)-arm.*/\1/p')
          if [ -z "$VER" ]; then
            VER=$(date +'%Y%m%d')
          fi
          TAG="v${VER}-mod"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

          # Build release notes
          INCLUDED_PATCHES=$(awk '
            /^\[Instagram-Piko\]/{found=1}
            found && /^included-patches/{capturing=1; next}
            capturing && /"""/{capturing=0; next}
            capturing && /\\$/{gsub(/'\''/, "", $0); gsub(/\\/, "", $0); gsub(/^ +| +$/, "", $0); if($0!="") print; next}
            capturing{gsub(/'\''/, "", $0); gsub(/\\/, "", $0); gsub(/^ +| +$/, "", $0); if($0!="") print}
          ' config.toml)

          EXCLUDED_PATCHES=$(awk '
            /^\[Instagram-Piko\]/{found=1}
            found && /^excluded-patches/{capturing=1; next}
            capturing && /"""/{capturing=0; next}
            capturing && /\\$/{gsub(/'\''/, "", $0); gsub(/\\/, "", $0); gsub(/^ +| +$/, "", $0); if($0!="") print; next}
            capturing{gsub(/'\''/, "", $0); gsub(/\\/, "", $0); gsub(/^ +| +$/, "", $0); if($0!="") print}
          ' config.toml)

          PATCH_COUNT=$(echo "$INCLUDED_PATCHES" | wc -l)

          {
            echo "## 📸 Instagram Mod v${VER}"
            echo ""
            echo "### ✨ Features"
            echo "- 🖤 AMOLED theme (pure black)"
            echo "- 📥 Download: posts, reels, stories, highlights, profile pics, audio"
            echo "- 🛡️ Privacy: block analytics, disable screenshot detection & typing"
            echo "- 🔍 Image quality: 2048px from CDN"
            echo "- 🔧 Dev options: unlock internal MetaConfig flags (257 curated)"
            echo "- 🧹 Clean feed: hide nav buttons, suggested, ads, reels scrolling"
            echo "- 🔗 Links: sanitize tracking, open externally"
            echo "- 👤 Profile: follow back indicator, more options"
            echo "- 📋 Config: swap mc_overrides.json without root"
            echo "- 🔄 OTA: in-app updater downloads new mod APK from GitHub"
            echo "- 🇧🇷 Full Portuguese (BR) translation"
            echo ""
            echo "### Patches (${PATCH_COUNT} applied)"
            echo ""
            echo "| # | Patch |"
            echo "|---|-------|"
            i=1
            while IFS= read -r patch; do
              [ -z "$patch" ] && continue
              echo "| $i | $patch |"
              i=$((i + 1))
            done <<< "$INCLUDED_PATCHES"
            echo ""
            echo "<details><summary>Excluded patches</summary>"
            echo ""
            while IFS= read -r patch; do
              [ -z "$patch" ] && continue
              echo "- $patch"
            done <<< "$EXCLUDED_PATCHES"
            echo ""
            echo "</details>"
            echo ""
            echo "### Config Override"
            echo "Priority: external JSON > internal JSON > hardcoded (257 flags)"
            echo "\`/sdcard/Android/media/com.instagram.android/mc_overrides.json\`"
            echo ""
            if [ -f build.md ]; then
              echo "<details><summary>Build info</summary>"
              echo ""
              echo '```'
              cat build.md
              echo '```'
              echo "</details>"
            fi
          } > release-notes.md

          # Delete old release with same tag if exists
          OLD_RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$TAG" | \
            jq -r '.id // empty' 2>/dev/null || true)
          if [ -n "$OLD_RELEASE_ID" ]; then
            echo "Deleting old release $OLD_RELEASE_ID for tag $TAG"
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$OLD_RELEASE_ID" || true
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG" || true
          fi

          echo "created=true" >> $GITHUB_OUTPUT

      - name: Publish Release
        if: steps.release.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: "📸 Instagram Mod ${{ steps.release.outputs.tag }}"
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease == 'true' }}
          files: build/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: rm -f ks.keystore ks-p12.keystore
