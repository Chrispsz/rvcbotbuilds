name: Release Instagram Mod

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (e.g. v430.0.0.53.80-piko3.5.0-dev.2)'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release? (true/false)'
        required: false
        default: 'true'
      create_release:
        description: 'Create GitHub Release? (true/false)'
        required: false
        default: 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-instagram:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore keystores from secrets
        run: |
          echo "${{ secrets.KS_KEYSTORE_B64 }}" | base64 -d > ks.keystore
          echo "${{ secrets.KS_P12_KEYSTORE_B64 }}" | base64 -d > ks-p12.keystore
          chmod 644 ks.keystore ks-p12.keystore
          echo "Keystores restored from secrets"

      - name: Cache prebuilts
        uses: actions/cache@v4
        with:
          path: |
            temp/crimera-rv
          key: piko-prebuilts-v1-${{ github.run_id }}
          restore-keys: |
            piko-prebuilts-v1-

      - name: Install deps
        run: sudo apt-get install -y jq zip python3

      - name: Prepare Instagram-only config
        run: |
          set_app_enabled() {
            local section="$1" state="$2"
            awk -v sec="[$section]" -v val="enabled = $state" '
              $0 == sec { in_sec=1; print; next }
              in_sec && /^enabled = / { print val; in_sec=0; next }
              in_sec && /^\[/ { in_sec=0 }
              { print }
            ' config.toml > config.toml.tmp && mv config.toml.tmp config.toml
          }

          # Disable YouTube and Music
          set_app_enabled "YouTube-Morphe" false
          set_app_enabled "Music-Morphe" false

          echo "=== Active config ==="
          grep -E '^\[.*\]|^enabled' config.toml

      - name: Build Instagram
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x build.sh utils.sh
          echo "=== Starting Instagram-only build ==="
          bash build.sh config.toml 2>&1 | tee build.log
          echo "=== Build complete ==="

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: instagram-piko-apk
          path: build/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: |
            build.md
            build.log
          retention-days: 7

      - name: Generate release tag and notes
        id: release_info
        if: inputs.create_release == 'true'
        run: |
          # Auto-generate tag if not provided
          if [ -n "${{ inputs.version_tag }}" ]; then
            TAG="${{ inputs.version_tag }}"
          else
            APK=$(ls build/instagram-*.apk 2>/dev/null | head -1)
            if [ -n "$APK" ]; then
              # Extract version: filename is instagram-morphe-v430.0.0.53.80-arm64-v8a.apk
              # Match the version between -v and -arm64 (or -arm)
              VER=$(basename "$APK" | sed -n 's/.*-v\([0-9][0-9.]*\)-arm.*/\1/p')
              if [ -n "$VER" ]; then
                TAG="v${VER}-piko3.5.0-dev.2"
              else
                TAG="instagram-$(date +'%Y%m%d-%H%M')"
              fi
            else
              TAG="instagram-$(date +'%Y%m%d-%H%M')"
            fi
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

          # Extract included patches dynamically from config.toml
          # Use the multiline string between triple-quotes, split by single-quote delimiters
          INCLUDED_PATCHES=$(awk '
            /^\[Instagram-Piko\]/{found=1}
            found && /^included-patches/{capturing=1; next}
            capturing && /"""/{capturing=0; next}
            capturing && /\\$/{gsub(/'\''/, "", $0); gsub(/\\/, "", $0); gsub(/^ +| +$/, "", $0); if($0!="") print; next}
            capturing{gsub(/'\''/, "", $0); gsub(/\\/, "", $0); gsub(/^ +| +$/, "", $0); if($0!="") print}
          ' config.toml)

          # Extract excluded patches dynamically from config.toml
          EXCLUDED_PATCHES=$(awk '
            /^\[Instagram-Piko\]/{found=1}
            found && /^excluded-patches/{capturing=1; next}
            capturing && /"""/{capturing=0; next}
            capturing && /\\$/{gsub(/'\''/, "", $0); gsub(/\\/, "", $0); gsub(/^ +| +$/, "", $0); if($0!="") print; next}
            capturing{gsub(/'\''/, "", $0); gsub(/\\/, "", $0); gsub(/^ +| +$/, "", $0); if($0!="") print}
          ' config.toml)

          PATCH_COUNT=$(echo "$INCLUDED_PATCHES" | wc -l)

          # Generate release notes
          {
            echo "## 📸 Instagram Piko Mod"
            echo ""
            echo "### Patches Applied"
            echo ""
            echo "**${PATCH_COUNT} piko patches + 2 custom RVCBotBuilds patches**"
            echo ""
            echo "| # | Patch |"
            echo "|---|-------|"
            i=1
            while IFS= read -r patch; do
              [ -z "$patch" ] && continue
              echo "| $i | $patch |"
              i=$((i + 1))
            done <<< "$INCLUDED_PATCHES"
            echo ""
            echo "### Custom Patches (RVCBotBuilds binary patches)"
            echo ""
            echo "| # | Patch | Method | Effect |"
            echo "|---|-------|--------|--------|"
            echo "| $i | Allow Screenshots in DMs | FLAG_SECURE removal | Screenshot em DMs liberado |"
            echo "| $((i+1)) | MobileConfig Quality Override | medium→high, standard→hd | Qualidade maximizada |"
            echo ""
            echo "<details><summary>Patches excluídos (risky/detectable)</summary>"
            echo ""
            while IFS= read -r patch; do
              [ -z "$patch" ] && continue
              echo "- $patch"
            done <<< "$EXCLUDED_PATCHES"
            echo ""
            echo "</details>"
            echo ""
            if [ -f build.md ]; then
              echo "### Build Info"
              echo '```'
              cat build.md
              echo '```'
            fi
          } > release-notes.md

      - name: Create GitHub Release
        if: inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: "📸 Instagram Piko Mod ${{ steps.release_info.outputs.tag }}"
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease == 'true' }}
          files: |
            build/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        if: always()
        run: |
          echo "## 📸 Instagram Piko Mod Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls build/*.apk 2>/dev/null; then
            for apk in build/*.apk; do
              SIZE=$(du -h "$apk" | cut -f1)
              echo "- ✅ \`$(basename $apk)\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "- ❌ No APK built" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup keystores
        if: always()
        run: rm -f ks.keystore ks-p12.keystore
