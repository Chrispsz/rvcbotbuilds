name: 📺 Build YouTube + Music Mod

on:
  workflow_call:
    secrets:
      KS_KEYSTORE_B64:
        required: true
      KS_P12_KEYSTORE_B64:
        required: true
      KS_PASSWORD:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore keystores
        run: |
          echo "${{ secrets.KS_KEYSTORE_B64 }}" | base64 -d > ks.keystore
          echo "${{ secrets.KS_P12_KEYSTORE_B64 }}" | base64 -d > ks-p12.keystore
          chmod 644 ks.keystore ks-p12.keystore

      - name: Cache prebuilts
        uses: actions/cache@v4
        with:
          path: temp/morpheapp-rv
          key: morphe-prebuilts-v2-${{ github.run_id }}
          restore-keys: morphe-prebuilts-v2-

      - name: Install deps
        run: sudo apt-get install -y jq zip python3

      - name: Prepare YouTube+Music only config
        run: |
          set_app_enabled() {
            local section="$1" state="$2"
            awk -v sec="[$section]" -v val="enabled = $state" '
              $0 == sec { in_sec=1; print; next }
              in_sec && /^enabled = / { print val; in_sec=0; next }
              in_sec && /^\[/ { in_sec=0 }
              { print }
            ' config.toml > config.toml.tmp && mv config.toml.tmp config.toml
          }
          set_app_enabled "Instagram-Piko" false
          echo "=== Active config ==="
          grep -E '^\[.*\]|^enabled' config.toml

      - name: Build YouTube + Music
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
        run: |
          # Always force fresh Morphe patches download (latest version)
          rm -rf temp/morpheapp-rv/patches-*.mpe temp/morpheapp-rv/patches-*.jar 2>/dev/null || true
          rm -rf temp/morpheapp-rv/cli-*.jar 2>/dev/null || true
          echo "Cleared cached Morphe files — will download fresh from MorpheApp/morphe-patches"

          chmod +x build.sh utils.sh
          bash build.sh config.toml 2>&1 | tee build.log

      - name: Diagnose YouTube build
        if: always()
        run: |
          echo "=== Build Outputs ==="
          echo "--- APKs ---"
          ls -la build/*.apk 2>/dev/null || echo "No APKs"
          echo ""
          echo "--- Magisk Modules ---"
          ls -la build/*.zip 2>/dev/null || echo "No modules"
          echo ""

          # Check build log for errors
          if [ -f "build.log" ]; then
            echo "=== Build Log Analysis ==="
            ERROR_COUNT=$(grep -ci "failed\|error\|incompatible" build.log 2>/dev/null || true)
            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "⚠️  $ERROR_COUNT potential error(s) in build log:"
              grep -i "failed\|error\|incompatible" build.log 2>/dev/null | tail -10
            else
              echo "✅ No obvious errors in build log"
            fi
          fi

          # Verify YouTube APK
          YT_APK=$(find build/ -name "youtube-morphe-*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$YT_APK" ]; then
            YT_SIZE=$(stat -c%s "$YT_APK" 2>/dev/null || stat -f%z "$YT_APK" 2>/dev/null || echo "0")
            YT_SIZE_MB=$((YT_SIZE / 1024 / 1024))
            echo ""
            echo "=== YouTube APK ==="
            echo "  File: $(basename "$YT_APK")"
            echo "  Size: ${YT_SIZE_MB} MB"

            if [ "$YT_SIZE_MB" -lt 40 ]; then
              echo "  ⚠️  APK is very small — patches may not have been applied"
            else
              echo "  ✅ APK size looks normal"
            fi
          fi

          # Verify Music APK
          MU_APK=$(find build/ -name "music-morphe-*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$MU_APK" ]; then
            MU_SIZE=$(stat -c%s "$MU_APK" 2>/dev/null || stat -f%z "$MU_APK" 2>/dev/null || echo "0")
            MU_SIZE_MB=$((MU_SIZE / 1024 / 1024))
            echo ""
            echo "=== Music APK ==="
            echo "  File: $(basename "$MU_APK")"
            echo "  Size: ${MU_SIZE_MB} MB"
          fi

          # Verify Magisk module
          YT_MODULE=$(find build/ -name "youtube-morphe-*.zip" -type f 2>/dev/null | head -1)
          if [ -n "$YT_MODULE" ]; then
            echo ""
            echo "=== YouTube Magisk Module ==="
            echo "  File: $(basename "$YT_MODULE")"
            echo "  ✅ Magisk module created"
          fi

      - name: Upload YouTube APK
        uses: actions/upload-artifact@v4
        with:
          name: youtube-mod-apk
          path: build/youtube-*.apk
          retention-days: 5
          if-no-files-found: warn

      - name: Upload YouTube Magisk Module
        uses: actions/upload-artifact@v4
        with:
          name: youtube-magisk-module
          path: build/youtube-*.zip
          retention-days: 5
          if-no-files-found: warn

      - name: Upload Music APK
        uses: actions/upload-artifact@v4
        with:
          name: music-mod-apk
          path: build/music-*.apk
          retention-days: 5
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: rm -f ks.keystore ks-p12.keystore
