# ============================================
# RVCArise — Premium YouTube & Music Mods
# ============================================
# MorpheApp/morphe-patches (latest stable)
# MorpheApp/morphe-cli (latest stable)
# zygisk-detach (auto-updated by CI)
# ============================================

enable-module-update = true
parallel-jobs = 2
compression-level = 9
riplib = true
remove-rv-integrations-checks = true
continue-on-error = true
default-arch = "arm64-v8a"

# ============================================
# YouTube Morphe — APK + Magisk Module
# ============================================
# Only patches a real user will notice and use
#
# RE-ENABLED (was removed in v1.30 due to stuttering; fully fixed in v1.35):
#   Spoof video streams — REQUIRED. Without it, Google's server-side throttling
#   causes playback to freeze at exactly the 1-minute mark on most clients.
#   v1.35 ships a rewritten patch with new client types (ANDROID_REEL_AUTH as
#   default, with TV / ANDROID_VR fallback) and automatic client fall-over.
#   See: MorpheApp/morphe-patches#115, PR #116, commits cafec9c and ce3f496.
#
# REMOVED due to bugs/stuttering:
#   SponsorBlock — undo toast freezes UI (#1555)
#   Return YouTube Dislike — API timeout freezes app 5-10s (#1451)
#   Sanitize sharing links — broken in v1.30.0 (#1602)
#   Open system share sheet — broken in v1.30.0 (#1597)
#
# REMOVED as low-value (not buggy, just not useful without manual config):
#   Playback speed — only adds a button unless you configure custom speeds
#                    in Settings > Morphe > Video. YouTube native has 0.25x-2x.
#   Hide Shorts components — only hides launcher shortcut/widget, NOT Shorts
#                            in the feed. Hide layout components covers the feed.
#   Swipe controls — patch is applied but feature ships OFF in-app; you must
#                    manually toggle Settings > Morphe > Video > Swipe controls.
#                    Removed to avoid dead code in the APK.
# ============================================
[YouTube-Morphe]
enabled = true
app-name = "YouTube"
patches-source = "MorpheApp/morphe-patches"
# Pinned to v1.35.0 — the first stable release that ships the rewritten
# Spoof video streams patch (default client = ANDROID_REEL_AUTH with TV /
# ANDROID_VR fallback). Older versions have the 1-min playback freeze bug
# (MorpheApp/morphe-patches#115). Bump this when a new stable is released.
patches-version = "v1.36.0"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
version = "auto"

patcher-args = """\
  -OdarkThemeBackgroundColor=@android:color/black \
  """

included-patches = """\
  'Downloads' \
  'Hide layout components' \
  'Navigation bar' \
  'Change start page' \
  'Remove background playback restrictions' \
  'Spoof video streams' \
  """

excluded-patches = """\
  'Custom branding' \
  'Disable QUIC protocol' \
  'Hide Shorts components' \
  'Playback speed' \
  'Swipe controls' \
  'Disable double tap actions' \
  'Disable haptic feedback' \
  'Disable layout updates' \
  'Disable player popup panels' \
  'Disable rolling number animations' \
  'Disable sign in to TV popup' \
  'Disable video codecs' \
  'Enable debugging' \
  'Hide timestamp' \
  'Spoof app version' \
  'Check watch history domain name resolution' \
  'Override YouTube Music buttons' \
  'Return YouTube Dislike' \
  'SponsorBlock' \
  'Sanitize sharing links' \
  'Open system share sheet' \
  'Alternative thumbnails' \
  'Bypass URL redirects' \
  'Copy video URL' \
  'Hide player flyout menu components' \
  'Hide video action buttons' \
  'Loop video' \
  'Miniplayer' \
  'Open Shorts in regular player' \
  'Spoof device dimensions' \
  """

uptodown-dlurl = "https://youtube.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

# ============================================
# Music Morphe — APK + Magisk Module
# ============================================
# Only patches a real user will notice and use
#
# RE-ENABLED (was removed in v1.30 due to audio stuttering; fixed in v1.35):
#   Spoof video streams — REQUIRED. Without it, Google's server-side throttling
#   causes playback to freeze at the 1-minute mark. v1.35 ships a rewritten
#   patch with new client types and automatic client fall-over.
#   See: MorpheApp/morphe-patches#115, PR #116.
#
# REMOVED due to bugs/stuttering:
#   Sanitize sharing links — broken in v1.30.0 (#1602)
#   Track crossfade — breaks casting, lock screen (#1549)
# ============================================
[Music-Morphe]
enabled = true
app-name = "Music"
patches-source = "MorpheApp/morphe-patches"
# Pinned to v1.35.0 — see YouTube-Morphe above for rationale.
patches-version = "v1.36.0"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
version = "auto"

patcher-args = """\
  -OdarkThemeBackgroundColor=@android:color/black \
  """

included-patches = """\
  'Enable exclusive audio playback' \
  'Miniplayer previous and next buttons' \
  'Remember repeat state' \
  'Spoof video streams' \
  """

excluded-patches = """\
  'Custom branding' \
  'Disable QUIC protocol' \
  'Enable debugging' \
  'Track crossfade' \
  'Bypass certificate checks' \
  'Check watch history domain name resolution' \
  'Sanitize sharing links' \
  'Change miniplayer color' \
  'Hide buttons' \
  'Hide category bar' \
  'Navigation bar' \
  """

uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
