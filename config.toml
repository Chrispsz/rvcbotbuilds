# ============================================
# RVCBotBuilds - Morphe (arm64-v8a)
# With Auto-Detach (Zygisk)
# ============================================

enable-module-update = true
parallel-jobs = 2  # 2 is safer for GitHub Actions (7GB RAM limit); 3 can OOM with large APKs
compression-level = 9
riplib = true
remove-rv-integrations-checks = true
continue-on-error = true

# === Architecture ===
default-arch = "arm64-v8a"

# ============================================
# YouTube Morphe - APK + Module (arm64-v8a)
# AMOLED dark theme (pure black)
# Auto-Detach blocks Play Store updates
# ============================================
[YouTube-Morphe]
enabled = true
app-name = "YouTube"
patches-source = "MorpheApp/morphe-patches"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
included-patches = "'Theme'"
excluded-patches = "'Custom branding' 'SponsorBlock' 'Return YouTube Dislike' 'Hide player overlay buttons'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

# ============================================
# Music Morphe - APK + Module (arm64-v8a)
# AMOLED dark theme (pure black)
# ============================================
[Music-Morphe]
enabled = true
app-name = "Music"
patches-source = "MorpheApp/morphe-patches"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
included-patches = "'Theme'"
excluded-patches = "'Custom branding' 'Enable debug logging' 'SponsorBlock'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"

# ============================================
# Instagram Piko — Module (arm64-v8a)
# crimera/piko v3.5.0-dev.2: 19 patches
#
# Base: 430.0.0.53.80 (piko officially supported version)
#
# Module features (like YouTube ReVanced module):
#   📦 APK bind mount — patched APK replaces stock at runtime
#   🔄 OTA updates — Magisk checks updateJson for module updates
#   ⚙️ MetaConfig inject — mc_overrides.json (257 curated flags) copied to
#      /data/data/com.instagram.instagram/files/mobileconfig/ on every boot
#      → Quality max, anti-ads, privacy, developer mode, feature unlocks
#      → Curated from 960: removed 703 trivial/low-impact flags
#      → 148 documented flags (quality/privacy/ads/dev/media) ALL preserved
#      → Dangerous Stories flags (59117, 92643, 69238) excluded
#      → Survives app updates (re-injected each boot by service.sh)
#      → OTA: checks GitHub for updated mc_overrides.json on boot
#
#   No detach needed — patched Instagram APK isn't recognized by Play Store
#
# Patches included:
#   🖤 AMOLED theme · 📥 Download media · 🚫 Disable ads
#   📸 Screenshot detection off · 👥 Follow back indicator
#   🔒 Disable typing status · 📥 Download voice message
#   🔗 Open links externally · 🧹 Remove build popup
#   🛡️ Disable analytics · 🔧 Add settings + Developer options
#   📋 Copy comment · ✂️ Sanitize share links · 👁 Improve image viewing
#   📎 More options on post/profile · 📰 Hide suggested content
#
# EXCLUDED (stories crash — piko bug #914/#969):
#   View story mentions · Hide stories tray · Make ephemeral media permanent
# EXCLUDED (risky/detectable):
#   View DMs/live/stories anonymously · Limit feed to following
# EXCLUDED (dangerous):
#   Unlock employee options · Unlock Plus benefits · Hide navigation buttons
# ============================================
[Instagram-Piko]
app-name = "Instagram"
patches-source = "crimera/piko"
patches-version = "dev"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
version = "430.0.0.53.80"
exclusive-patches = true
patcher-args = "--continue-on-error"
arch = "arm64-v8a"
included-patches = """\
  'Add settings' \
  'Amoled theme' \
  'Copy comment' \
  'Disable analytics' \
  'Disable ads' \
  'Disable screenshot detection' \
  'Disable typing status' \
  'Download media' \
  'Download voice message' \
  'Follow back indicator' \
  'Hide suggested content' \
  'Improve image viewing' \
  'More options on post' \
  'More options on profile' \
  'Open links externally' \
  'Remove build expired popup' \
  'Sanitize share links' \
  'Unlock developer options' \
  """
excluded-patches = """\
  'Unlock employee options' \
  'Unlock Plus benefits' \
  'View DMs anonymously' \
  'View live anonymously' \
  'View stories anonymously' \
  'Limit feed to following profiles' \
  'Hide navigation buttons' \
  'View story mentions' \
  'Hide stories tray' \
  'Make ephemeral media permanent' \
  """
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
