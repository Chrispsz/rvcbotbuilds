# ============================================
# RVCBotBuilds — Instagram & YouTube Mods
# ============================================

enable-module-update = true
parallel-jobs = 2
compression-level = 9
riplib = true
remove-rv-integrations-checks = true
continue-on-error = false
default-arch = "arm64-v8a"

# ============================================
# YouTube Morphe — APK + Magisk Module
# ============================================
[YouTube-Morphe]
enabled = true
app-name = "YouTube"
patches-source = "MorpheApp/morphe-patches"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
included-patches = "'Theme'"
excluded-patches = "'Custom branding' 'SponsorBlock' 'Return YouTube Dislike' 'Hide player overlay buttons'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

# ============================================
# Music Morphe — APK only
# ============================================
[Music-Morphe]
enabled = true
app-name = "Music"
patches-source = "MorpheApp/morphe-patches"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "apk"
arch = "arm64-v8a"
included-patches = "'Theme'"
excluded-patches = "'Custom branding' 'Enable debug logging' 'SponsorBlock'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"

# ============================================
# Instagram Mod — Chrispsz/piko fork (official + OTA)
# ============================================
[Instagram-Piko]
enabled = true
app-name = "Instagram"
patches-source = "Chrispsz/piko"
patches-version = "dev"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "apk"
version = "430.0.0.53.80"
exclusive-patches = true
arch = "arm64-v8a"
included-patches = """\
  'Add settings' \
  'Amoled theme' \
  'Disable analytics' \
  'Disable ads' \
  'Download media' \
  'Follow back indicator' \
  'Hide suggested content' \
  'Improve image viewing' \
  'More options on post' \
  'Copy comment' \
  'Make ephemeral media permanent' \
  'OTA update checker' \
  'Open links externally' \
  'Remove build expired popup' \
  'Unlock developer options' \
  """
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
