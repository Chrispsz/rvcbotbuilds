# ============================================
# RVCBotBuilds - Morphe (arm64-v8a)
# With Auto-Detach (Zygisk)
# ============================================

enable-module-update = true
parallel-jobs = 2  # 2 is safer for GitHub Actions (7GB RAM limit); 3 can OOM with large APKs
compression-level = 9
riplib = true
remove-rv-integrations-checks = true
continue-on-error = true

# === Architecture ===
default-arch = "arm64-v8a"

# ============================================
# YouTube Morphe - APK + Module (arm64-v8a)
# AMOLED dark theme (pure black)
# Auto-Detach blocks Play Store updates
# ============================================
[YouTube-Morphe]
enabled = true
app-name = "YouTube"
patches-source = "MorpheApp/morphe-patches"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
included-patches = "'Theme'"
excluded-patches = "'Custom branding' 'SponsorBlock' 'Return YouTube Dislike' 'Hide player overlay buttons'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

# ============================================
# Music Morphe - APK + Module (arm64-v8a)
# AMOLED dark theme (pure black)
# ============================================
[Music-Morphe]
enabled = true
app-name = "Music"
patches-source = "MorpheApp/morphe-patches"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
included-patches = "'Theme'"
excluded-patches = "'Custom branding' 'Enable debug logging' 'SponsorBlock'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"

# ============================================
# Instagram Piko - APK (arm64-v8a)
# crimera/piko v3.5.0-dev.2: 21 patches
#
# Base: 430.0.0.53.80 (piko officially supported version)
# Patches: dev channel (v3.5.0-dev.2)
#
# 🖤 AMOLED theme (pure black)
# 📥 Download: posts, reels, stories, highlights, profile pics, audio, voice messages, video variants
# 🚫 Ads: remove all ads + suggested content
# 📸 Screenshots: screenshot detection disabled
# 👥 Follow back: see who follows you back
# 🔒 Ephemeral media: view-once messages stay permanent
# 🔧 Settings: Piko Settings hub + Developer options
# 🛡️ Privacy: analytics off, typing hidden, links sanitized
# 🧹 Clean: hide stories tray, build popup
#
# EXCLUDED (risky/detectable):
#   View DMs anonymously — Ghost mode in DMs (Instagram can detect, ban risk)
#   View live anonymously — Same detection risk
#   View stories anonymously — High detection risk, Meta monitors
#   Limit feed to following profiles — Breaks feed algorithm
#
# EXCLUDED (dangerous):
#   Unlock employee options — Exposes internal Meta tools
#   Unlock Plus benefits — TOS violation, detectable
#   Hide navigation buttons — Can break UI, confusing UX
# ============================================
[Instagram-Piko]
app-name = "Instagram"
patches-source = "crimera/piko"
patches-version = "dev"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
version = "430.0.0.53.80"
exclusive-patches = true
patcher-args = "--continue-on-error"
arch = "arm64-v8a"
included-patches = """\
  'Add settings' \
  'Amoled theme' \
  'Copy comment' \
  'Disable analytics' \
  'Disable ads' \
  'Disable screenshot detection' \
  'Disable typing status' \
  'Download media' \
  'Download voice message' \
  'Follow back indicator' \
  'Hide stories tray' \
  'Hide suggested content' \
  'Improve image viewing' \
  'Make ephemeral media permanent' \
  'More options on post' \
  'More options on profile' \
  'Open links externally' \
  'Remove build expired popup' \
  'Sanitize share links' \
  'Unlock developer options' \
  'View story mentions' \
  """
excluded-patches = """\
  'Unlock employee options' \
  'Unlock Plus benefits' \
  'View DMs anonymously' \
  'View live anonymously' \
  'View stories anonymously' \
  'Limit feed to following profiles' \
  'Hide navigation buttons' \
  """
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
