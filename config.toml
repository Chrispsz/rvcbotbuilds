# ============================================
# RVCBotBuilds - Morphe (arm64-v8a)
# With Auto-Detach (Zygisk)
# ============================================

enable-module-update = true
parallel-jobs = 2  # 2 is safer for GitHub Actions (7GB RAM limit); 3 can OOM with large APKs
compression-level = 9
riplib = true
remove-rv-integrations-checks = true
continue-on-error = true

# === Architecture ===
default-arch = "arm64-v8a"

# ============================================
# YouTube Morphe - APK + Module (arm64-v8a)
# AMOLED dark theme (pure black)
# Auto-Detach blocks Play Store updates
# ============================================
[YouTube-Morphe]
enabled = true
app-name = "YouTube"
patches-source = "MorpheApp/morphe-patches"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
included-patches = "'Theme'"
excluded-patches = "'Custom branding' 'SponsorBlock' 'Return YouTube Dislike' 'Hide player overlay buttons'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

# ============================================
# Music Morphe - APK + Module (arm64-v8a)
# AMOLED dark theme (pure black)
# ============================================
[Music-Morphe]
enabled = true
app-name = "Music"
patches-source = "MorpheApp/morphe-patches"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
included-patches = "'Theme'"
excluded-patches = "'Custom branding' 'Enable debug logging' 'SponsorBlock'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"

# ============================================
# Instagram Piko — Chrispsz fork (arm64-v8a)
# Chrispsz/piko: 257 preset flags + JSON override + OTA updater
#
# Base: 430.0.0.53.80 (piko officially supported version)
#
# Extension features (built into patched APK):
#   🖤 AMOLED theme (pure black)
#   📥 Download: posts, reels, stories, highlights, profile pics, audio
#   🛡️ Privacy: block analytics, disable screenshot detection & typing
#   🔍 Image quality: 2048px from CDN (vs 1080px default)
#   🔧 Dev options: unlock internal MetaConfig flags (257 curated)
#   🧹 Clean feed: hide nav buttons, suggested, ads, reels scrolling
#   🔗 Links: sanitize tracking, open externally
#   👤 Profile: follow back indicator, more options
#   📋 Config: swap mc_overrides.json without root
#      → /sdcard/Android/media/com.instagram.android/mc_overrides.json
#      → or import via Piko Settings → Import overrides
#   🔄 OTA: in-app updater downloads new mod APK from GitHub
#
# JSON override priority: external storage > internal > hardcoded
# No detach needed — patched APK isn't recognized by Play Store
# ============================================
[Instagram-Piko]
app-name = "Instagram"
patches-source = "Chrispsz/piko"
patches-version = "dev"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
version = "430.0.0.53.80"
exclusive-patches = true
patcher-args = "--continue-on-error"
arch = "arm64-v8a"
included-patches = """\
  'Add settings' \
  'Amoled theme' \
  'Copy comment' \
  'Disable analytics' \
  'Disable ads' \
  'Disable screenshot detection' \
  'Disable typing status' \
  'Download media' \
  'Download voice message' \
  'Follow back indicator' \
  'Hide suggested content' \
  'Improve image viewing' \
  'More options on post' \
  'More options on profile' \
  'Open links externally' \
  'Remove build expired popup' \
  'Sanitize share links' \
  'Unlock developer options' \
  'Preset flags' \
  """
excluded-patches = """\
  'Unlock employee options' \
  'Unlock Plus benefits' \
  """
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
