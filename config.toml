# ============================================
# RVCBotBuilds - Morphe (arm64-v8a)
# With Auto-Detach (Zygisk) + Custom Patches
# ============================================

enable-module-update = true
parallel-jobs = 1
compression-level = 9
riplib = true
remove-rv-integrations-checks = true
continue-on-error = true

# === Architecture ===
default-arch = "arm64-v8a"

# ============================================
# YouTube Morphe - APK + Module (arm64-v8a)
# AMOLED dark theme (pure black)
# Auto-Detach blocks Play Store updates
# ============================================
[YouTube-Morphe]
enabled = false
app-name = "YouTube"
patches-source = "MorpheApp/morphe-patches"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
included-patches = "'Theme'"
excluded-patches = "'Custom branding'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

# ============================================
# Music Morphe - APK + Module (arm64-v8a)
# AMOLED dark theme (pure black)
# ============================================
[Music-Morphe]
enabled = false
app-name = "Music"
patches-source = "MorpheApp/morphe-patches"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
included-patches = "'Theme'"
excluded-patches = "'Custom branding'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"

# ============================================
# Instagram Piko - APK (arm64-v8a)
# crimera/piko: 25 patches + 2 custom RVCBotBuilds patches
#
# 🖤 AMOLED theme (pure black)
# 📥 Download: posts, reels, stories, highlights, profile pics, audio
# 👻 Ghost mode: stories, DMs, lives — all anonymous
# 🚫 Ads: remove all ads + suggested content
# 🔍 Image quality: 2048px from CDN + MobileConfig override
# 📸 Screenshots: FLAG_SECURE removed + screenshot detection disabled
# 🔧 Settings: Piko Settings hub + Developer options (MetaConfig)
# 🛡️ Privacy: analytics off, typing hidden, links sanitized
# 🧹 Clean: hide stories tray, nav buttons, build popup
#
# NOT included (10 — niche/cosmetic/annoying):
#   Change like animation, Customise story timestamp, Disable Reels scrolling,
#   Disable discover people, Disable double tap like, Disable video autoplay,
#   Hide notes tray, Hide reshare button, Remove empty bottom space,
#   Stories audio autoplay
# EXCLUDED (2 — risky):
#   Unlock employee options, Unlock Plus benefits
# ============================================
[Instagram-Piko]
app-name = "Instagram"
patches-source = "crimera/piko"
patches-version = "latest"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "apk"
version = "latest"
exclusive-patches = true
patcher-args = "--continue-on-error"
arch = "arm64-v8a"
included-patches = """\
  'Add settings' \
  'Amoled theme' \
  'Copy comment' \
  'Disable analytics' \
  'Disable ads' \
  'Disable screenshot detection' \
  'Disable typing status' \
  'Follow back indicator' \
  'Hide navigation buttons' \
  'Hide stories tray' \
  'Hide suggested content' \
  'Improve image viewing' \
  'Limit feed to following profiles' \
  'Make ephemeral media permanent' \
  'More options on post' \
  'Open links externally' \
  'Remove build expired popup' \
  'Unlock developer options' \
  'View DMs anonymously' \
  'View live anonymously' \
  'View stories anonymously' \
  """
excluded-patches = """\
  'Unlock employee options' \
  'Unlock Plus benefits' \
  'Download media' \
  'More options on profile' \
  'Sanitize share links' \
  'View story mentions' \
  """
# NOTE: 4 patches moved to excluded (broken on Instagram v432+):
#   Download media — IndexOutOfBoundsException in MediaDataEntity
#   More options on profile — NoSuchElementException in UserDataEntity
#   Sanitize share links — NullPointerException in PermalinkResponseJsonParser
#   View story mentions — depends on failed UserDataEntity (same as More options on profile)
# Custom Smali patches applied AFTER ReVanced CLI:
#   📸 Allow Screenshots in DMs — removes FLAG_SECURE from Window.setFlags
#   🔍 MobileConfig Quality Override — medium→high, standard→hd
# See: custom-patches/apply-custom-patches.sh
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
