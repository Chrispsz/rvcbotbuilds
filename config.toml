# ============================================
# RVCBotBuilds - Morphe (arm64-v8a)
# With Auto-Detach (Zygisk) + RevPack
# ============================================

enable-module-update = true
parallel-jobs = 1
compression-level = 9
riplib = true
remove-rv-integrations-checks = true
continue-on-error = true

# === Architecture ===
default-arch = "arm64-v8a"

# === RevPack (Combined Module) ===
# Bundles all built modules into one flashable zip
combine-modules = true
pack-name = "rvcbot-revpack"
pack-exclude-apps = "Instagram"

# ============================================
# YouTube Morphe - APK + Module (arm64-v8a)
# Morphe patches with key included patches
# Auto-Detach blocks Play Store updates
# ============================================
[YouTube-Morphe]
app-name = "YouTube"
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
included-patches = "'MaterialYou'"
excluded-patches = "'Custom branding' 'Theme'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"

# ============================================
# Music Morphe - APK + Module (arm64-v8a)
# Morphe patches, MaterialYou theme
# ============================================
[Music-Morphe]
app-name = "Music"
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
arch = "arm64-v8a"
excluded-patches = "'Custom branding'"
patcher-args = "-e 'Theme' -OdarkThemeBackgroundColor=@android:color/system_neutral1_900 -OlightThemeBackgroundColor=@android:color/system_neutral1_50"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"

# ============================================
# Instagram Morphe - APK (arm64-v8a)
# brosssh/morphe-patches: 17 Instagram patches
# Hide ads, reels, suggested content, etc.
# ============================================
[Instagram-Morphe]
app-name = "Instagram"
patches-source = "brosssh/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "apk"
arch = "arm64-v8a"
excluded-patches = "'Unlock developer options'"
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
